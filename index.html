<style>
:root{
  --encre:#3B1670; --encre-2:#2A0F52; --flamme:#A450FB; --flamme-2:#8A34E4;
  --papier:#F7F5FB; --carte:#FFFFFF; --carte2:#FAF8FD; --carbone:#1E1826; --gris:#6F6884; --trait:#E6E1F0;
  --sapin:#1E7A46; --sapin-p:#E4F3E9; --brique:#B3261E; --brique-p:#FBEAE8;
  --ambre:#B45D0C; --ambre-p:#FDF0DF; --bleu-p:#F1E9FD;
  --champ:#FFFFFF; --accent-clair:#FFD9C9;
  --r:12px;
}
body[data-theme="dark"]{
  --encre:#2A0F52; --encre-2:#1D0A3B; --flamme:#A450FB; --flamme-2:#8A34E4;
  --papier:#141020; --carte:#1E1830; --carte2:#251E3A; --carbone:#EDE8F7; --gris:#A79FC2; --trait:#37304F;
  --sapin:#4CAF77; --sapin-p:#1C3527; --brique:#E06A62; --brique-p:#3A1F1D;
  --ambre:#E0A050; --ambre-p:#3A2E1A; --bleu-p:#2C2145;
  --champ:#151022;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Albert Sans',sans-serif;background:var(--papier);color:var(--carbone);min-height:100vh}
.mono{font-family:'Spline Sans Mono',monospace}
h1,h2,.disp{font-family:'Archivo Black',sans-serif;letter-spacing:.01em}

/* ---------- Coque : rail intercalaires + contenu ---------- */
.app{display:flex;min-height:100vh}
.rail{width:236px;background:var(--encre);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;transition:width .2s}
.app.mini .rail{width:66px}
.app.mini .brand div,.app.mini .tab .lbl,.app.mini .tab .badge,.app.mini .rail-foot{display:none}
.app.mini .brand{padding:16px 12px;justify-content:center}
.app.mini .tab{justify-content:center;padding:13px 0}
.app.mini #themebtn{justify-content:center}
.plier{background:none;border:none;color:#D9C6F5;cursor:pointer;font:600 .8rem 'Albert Sans';padding:10px 16px;text-align:left;display:flex;align-items:center;gap:10px}
.plier:hover{color:#fff}
.app.mini .plier{justify-content:center;padding:10px 0}
.brand{padding:22px 18px 16px}
.brand .disp{font-size:1.15rem;line-height:1.1}
.brand small{display:block;color:#C9A9F0;font-weight:500;margin-top:4px;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase}
.tabs{display:flex;flex-direction:column;gap:2px;margin-top:8px}
.rail{justify-content:flex-start}
.tab{display:flex;align-items:center;gap:10px;padding:12px 16px;color:#D9C6F5;background:none;border:none;font:600 .92rem 'Albert Sans';cursor:pointer;text-align:left;border-left:5px solid transparent;transition:background .15s}
.tab:hover{background:rgba(255,255,255,.07)}
.tab.on{background:var(--papier);color:var(--encre);border-left-color:var(--flamme);border-radius:0 var(--r) var(--r) 0;margin-right:-1px}
.tab .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tab .badge{margin-left:auto;background:var(--flamme);color:#fff;border-radius:99px;font-size:.7rem;padding:1px 7px;font-weight:700}
.rail-foot{padding:14px 16px;font-size:.7rem;color:#BFA1EA}
.main{flex:1;min-width:0;padding:26px 30px 60px}

/* ---------- Barre haute ---------- */
.topbar{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.topbar h1{font-size:1.5rem;color:var(--encre)}
.topbar .date{color:var(--gris);font-weight:500}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{border:none;border-radius:10px;padding:10px 16px;font:700 .88rem 'Albert Sans';cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:transform .12s, box-shadow .12s}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--flamme);color:#fff;box-shadow:0 3px 0 var(--flamme-2)}
.btn-p:hover{box-shadow:0 4px 0 var(--flamme-2);transform:translateY(-1px)}
.btn-o{background:var(--carte);color:var(--carbone);border:1.5px solid var(--trait)}
.btn-o:hover{border-color:var(--encre)}
.btn-ghost{background:none;color:var(--gris);padding:8px 10px}
.btn-ghost:hover{color:var(--encre)}

/* ---------- KPI ---------- */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px;margin-bottom:22px}
.kpi{background:var(--carte);border:1px solid var(--trait);border-radius:var(--r);padding:14px 16px}
.kpi label{font-size:.72rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--gris)}
.kpi .v{font-family:'Spline Sans Mono';font-weight:700;font-size:1.7rem;color:var(--encre);margin-top:4px;line-height:1.1}
.kpi .v.orange{color:var(--flamme)} .kpi .v.vert{color:var(--sapin)} .kpi .v.rouge{color:var(--brique)}
.kpi small{color:var(--gris);font-size:.75rem}

/* ---------- Filtres 1-clic ---------- */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.chip{border:1.5px solid var(--trait);background:var(--carte);color:var(--carbone);border-radius:99px;padding:8px 15px;font:600 .85rem 'Albert Sans';cursor:pointer;display:inline-flex;gap:7px;align-items:center}
.chip .n{font-family:'Spline Sans Mono';font-weight:700;font-size:.78rem;color:var(--gris)}
.chip.on{border-color:var(--encre);background:var(--encre);color:#fff}
.chip.on .n{color:#E9D5FF}
.chip.c-enc.on{background:var(--flamme);border-color:var(--flamme)}
.chip.c-sig.on{background:var(--sapin);border-color:var(--sapin)}
.chip.c-per.on{background:var(--brique);border-color:var(--brique)}
.search{margin-left:auto;border:1.5px solid var(--trait);border-radius:10px;padding:9px 13px;font:500 .9rem 'Albert Sans';min-width:200px;background:var(--champ);color:var(--carbone)}
.search:focus{outline:2px solid var(--encre);outline-offset:1px}

/* ---------- Lignes-dossiers ---------- */
.rows{display:flex;flex-direction:column;gap:9px}
.row{background:var(--carte);border:1px solid var(--trait);border-left:6px solid var(--gris);border-radius:var(--r);padding:13px 16px;display:grid;grid-template-columns:minmax(160px,1.4fr) minmax(130px,1.1fr) 110px 120px auto;gap:6px 16px;align-items:center}
.row.enc{border-left-color:var(--flamme)} .row.sig{border-left-color:var(--sapin);background:linear-gradient(0deg,var(--sapin-p),var(--sapin-p)) , var(--carte)}
.row.per{border-left-color:var(--brique);background:var(--brique-p)}
.row .who b{font-size:1rem}
.row .who span{display:block;color:var(--gris);font-size:.8rem}
.row .prod{font-size:.88rem}
.row .prod small{display:block;color:var(--gris)}
.row .amt{font-family:'Spline Sans Mono';font-weight:700;font-size:.95rem}
.row .amt small{display:block;color:var(--gris);font-weight:500;font-size:.72rem;font-family:'Albert Sans'}
.st{display:inline-block;border-radius:7px;padding:4px 10px;font-size:.76rem;font-weight:700}
.st-enc{background:var(--bleu-p);color:var(--encre)} .st-env{background:var(--ambre-p);color:var(--ambre)}
.st-sig{background:var(--sapin-p);color:var(--sapin)} .st-per{background:var(--brique-p);color:var(--brique)}
.rowbtns{display:flex;gap:5px;justify-self:end;flex-wrap:wrap}
.ic{border:1.5px solid var(--trait);background:var(--carte);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:.95rem;display:grid;place-items:center}
.ic:hover{border-color:var(--encre)}
.ic.v:hover{border-color:var(--sapin);background:var(--sapin-p)}
.ic.x:hover{border-color:var(--brique);background:var(--brique-p)}
.alerte{grid-column:1/-1;font-size:.8rem;font-weight:600;padding-top:2px}
.alerte.feu{color:var(--brique)} .alerte.ok{color:var(--sapin)} .alerte.plan{color:var(--ambre)}
.raison-tag{font-size:.78rem;color:var(--brique);font-weight:600}
.vide{background:var(--carte);border:1.5px dashed var(--trait);border-radius:var(--r);padding:40px;text-align:center;color:var(--gris)}
.vide b{color:var(--carbone)}

/* ---------- Tickets À faire ---------- */
.tickets{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.ticket{background:var(--carte);border:1px solid var(--trait);border-top:6px solid var(--flamme);border-radius:var(--r);padding:16px;position:relative}
.ticket.retard{border-top-color:var(--brique)}
.ticket .quand{font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.ticket.retard .quand{color:var(--brique)} .ticket:not(.retard) .quand{color:var(--flamme)}
.ticket h3{font-size:1.05rem;margin:5px 0 2px}
.ticket .tel{font-family:'Spline Sans Mono';font-size:.85rem;color:var(--encre)}
.ticket p{color:var(--gris);font-size:.85rem;margin:6px 0 12px}
.ticket .tbtns{display:flex;gap:7px;flex-wrap:wrap}

/* ---------- Tableaux (mensuel, pilotage, objectifs) ---------- */
.card{background:var(--carte);border:1px solid var(--trait);border-radius:var(--r);padding:18px;margin-bottom:18px}
.card h2{font-size:.95rem;color:var(--encre);margin-bottom:12px;letter-spacing:.03em}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{background:var(--encre);color:#fff;font-weight:700;padding:9px 10px;text-align:left;font-size:.78rem;letter-spacing:.04em}
th:first-child{border-radius:8px 0 0 8px} th:last-child{border-radius:0 8px 8px 0}
td{padding:9px 10px;border-bottom:1px solid var(--trait)}
tr:nth-child(even) td{background:var(--carte2)}
td.num{font-family:'Spline Sans Mono';font-weight:700;text-align:right}
tr.total td{background:var(--flamme);color:#fff;font-weight:700;border:none}
tr.total td.num{color:#fff}
.bar{height:9px;background:var(--trait);border-radius:99px;overflow:hidden;min-width:80px}
.bar i{display:block;height:100%;border-radius:99px;background:var(--sapin)}
.bar.low i{background:var(--brique)} .bar.mid i{background:var(--ambre)}
input.cell{width:80px;border:1.5px solid var(--trait);border-radius:8px;padding:6px 8px;font:600 .85rem 'Spline Sans Mono';text-align:right;background:var(--champ);color:var(--carbone)}
input.cell:focus{outline:2px solid var(--encre)}
select.annee{border:1.5px solid var(--trait);border-radius:10px;padding:8px 12px;font:700 .9rem 'Albert Sans';background:var(--champ);color:var(--carbone)}
canvas{max-height:260px}

/* ---------- Widgets réordonnables ---------- */
.wslot.edit{border:2px dashed var(--flamme);border-radius:14px;padding:6px;margin-bottom:14px;cursor:grab}
.wslot.edit:active{cursor:grabbing}
.wslot.edit .card{margin-bottom:0}
.wslot.dragover{outline:3px solid var(--flamme);outline-offset:2px;border-radius:14px}
.wbar{display:flex;align-items:center;gap:8px;padding:2px 6px 8px;font-size:.78rem;font-weight:700;color:var(--flamme)}
.wbar .wfl{margin-left:auto;display:flex;gap:4px}
/* ---------- Recherche globale ---------- */
#palette{position:fixed;inset:0;background:rgba(20,12,40,.6);z-index:170;display:flex;align-items:flex-start;justify-content:center;padding:9vh 16px}
.palcard{background:var(--carte);border-radius:14px;width:100%;max-width:560px;box-shadow:0 24px 70px rgba(0,0,0,.4);overflow:hidden}
.palcard input{width:100%;border:none;padding:16px 18px;font:600 1.05rem 'Albert Sans';background:var(--carte);color:var(--carbone);border-bottom:1px solid var(--trait)}
.palcard input:focus{outline:none}
.palres{max-height:52vh;overflow:auto}
.palres button{display:flex;gap:10px;align-items:center;width:100%;text-align:left;background:none;border:none;padding:11px 16px;cursor:pointer;font:500 .9rem 'Albert Sans';color:var(--carbone);border-bottom:1px solid var(--trait)}
.palres button:hover,.palres button.hl{background:var(--bleu-p)}
.palres .typ{font-size:.68rem;font-weight:700;padding:3px 8px;border-radius:6px;flex-shrink:0}
.palres small{color:var(--gris);display:block}
.palfoot{padding:8px 16px;font-size:.72rem;color:var(--gris);background:var(--carte2)}
/* ---------- Pipeline kanban ---------- */
.kanban{display:flex;gap:12px;overflow-x:auto;align-items:flex-start;padding-bottom:10px}
.kcol{min-width:225px;flex:1;background:var(--carte2);border:1px solid var(--trait);border-radius:var(--r);padding:10px}
.kcol.dragover{outline:2px dashed var(--flamme);outline-offset:-2px}
.khead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;padding:4px 4px 8px;border-bottom:3px solid var(--kc,var(--gris))}
.khead b{font-size:.82rem;letter-spacing:.03em;color:var(--kc,var(--carbone))}
.khead small{font-family:'Spline Sans Mono';color:var(--gris);font-size:.72rem}
.kcard{background:var(--carte);border:1px solid var(--trait);border-left:4px solid var(--kc,var(--gris));border-radius:9px;padding:9px 11px;margin-bottom:8px;cursor:grab;font-size:.85rem}
.kcard:active{cursor:grabbing}
.kcard b{display:block;font-size:.88rem}
.kcard .m{font-family:'Spline Sans Mono';font-weight:700}
.kcard small{color:var(--gris)}
.kcard .feu{color:var(--brique);font-weight:700;font-size:.74rem}
.kvide{color:var(--gris);font-size:.78rem;text-align:center;padding:14px 4px}
.modebtns{display:inline-flex;background:var(--carte2);border-radius:10px;padding:3px;gap:2px}
.modebtns button{border:none;background:none;padding:7px 13px;border-radius:8px;font:700 .82rem 'Albert Sans';color:var(--gris);cursor:pointer}
.modebtns button.on{background:var(--flamme);color:#fff}
/* ---------- Page de connexion ---------- */
#auth{position:fixed;inset:0;z-index:180;background:linear-gradient(160deg,var(--encre-2),var(--encre) 60%,#5B21A8);display:flex;align-items:center;justify-content:center;padding:18px}
.authcard{background:var(--carte);border-radius:18px;width:100%;max-width:400px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.authcard .haut{text-align:center;margin-bottom:18px}
.authcard .haut img{width:64px;height:64px;border-radius:50%}
.authcard .haut .disp{color:var(--encre);font-size:1.15rem;margin-top:8px}
.authtabs{display:flex;background:var(--carte2);border-radius:10px;padding:4px;margin-bottom:16px}
.authtabs button{flex:1;border:none;background:none;padding:9px;border-radius:8px;font:700 .88rem 'Albert Sans';color:var(--gris);cursor:pointer}
.authtabs button.on{background:var(--flamme);color:#fff}
.souvenir{display:flex;align-items:center;gap:9px;margin:14px 0 4px;font-size:.86rem;color:var(--carbone)}
.souvenir input{width:17px;height:17px;accent-color:var(--flamme)}
/* ---------- Autocomplétion client ---------- */
.sugwrap{position:relative}
.sug{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--carte);border:1.5px solid var(--encre);border-radius:10px;box-shadow:0 8px 24px rgba(14,26,66,.18);z-index:60;max-height:230px;overflow:auto}
.sug button{display:block;width:100%;text-align:left;background:none;border:none;padding:10px 13px;cursor:pointer;font:500 .9rem 'Albert Sans';border-bottom:1px solid var(--trait)}
.sug button:last-child{border-bottom:none}
.sug button:hover,.sug button.hl{background:var(--bleu-p)}
.sug b{color:var(--encre)}
.sug small{display:block;color:var(--gris)}
.sug .new{color:var(--flamme);font-weight:700}
/* ---------- Modale ---------- */
.veil{position:fixed;inset:0;background:rgba(14,26,66,.55);display:none;align-items:flex-start;justify-content:center;padding:30px 14px;overflow:auto;z-index:50}
.veil.on{display:flex}
.modal{background:var(--carte);border-radius:16px;max-width:640px;width:100%;padding:24px}
.modal h2{color:var(--encre);font-size:1.1rem;margin-bottom:16px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f{display:flex;flex-direction:column;gap:5px}
.f.full{grid-column:1/-1}
.f label{font-size:.75rem;font-weight:700;color:var(--gris);letter-spacing:.04em;text-transform:uppercase}
.f input,.f select,.f textarea{border:1.5px solid var(--trait);border-radius:10px;padding:10px 12px;font:500 .92rem 'Albert Sans';background:var(--champ);color:var(--carbone)}
.f input:focus,.f select:focus,.f textarea:focus{outline:2px solid var(--encre)}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}

/* ---------- Paramètres ---------- */
.plist{display:flex;flex-direction:column;gap:6px}
.pitem{display:flex;gap:8px;align-items:center;background:var(--carte2);border:1px solid var(--trait);border-radius:9px;padding:7px 10px}
.pitem span{flex:1;font-weight:500}
.pitem input{width:70px;border:1.5px solid var(--trait);border-radius:7px;padding:5px;font:600 .85rem 'Spline Sans Mono';text-align:right;background:var(--champ);color:var(--carbone)}
.padd{display:flex;gap:8px;margin-top:10px}
.padd input{flex:1;border:1.5px solid var(--trait);border-radius:9px;padding:9px 12px;font:500 .9rem 'Albert Sans';background:var(--champ);color:var(--carbone)}
.note{background:var(--bleu-p);border-radius:10px;padding:12px 14px;font-size:.83rem;color:var(--encre);margin-bottom:14px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--carbone);color:#fff;border-radius:10px;padding:12px 20px;font-weight:600;transition:transform .25s;z-index:99}
.toast.on{transform:translateX(-50%) translateY(0)}

@media (max-width:860px){
  .app{flex-direction:column}
  .app.mini .rail{width:100%}
  .app.mini .brand div,.app.mini .tab .lbl,.app.mini .rail-foot{display:block}
  .plier{display:none}
  .rail{width:100%;height:auto;position:static;flex-direction:column}
  .tabs{flex-direction:row;overflow-x:auto;padding:0 8px 8px}
  .tab{border-left:none;border-bottom:4px solid transparent;white-space:nowrap;border-radius:0}
  .tab.on{border-bottom-color:var(--flamme);border-radius:10px 10px 0 0;margin-right:0}
  .main{padding:18px 14px 50px}
  .row{grid-template-columns:1fr 1fr}
  .rowbtns{justify-self:start}
  .grid2{grid-template-columns:1fr}
  .search{min-width:0;width:100%;margin-left:0}
}
@media print{
  .rail,.actions,.filters,.rowbtns,.tab,.btn{display:none!important}
  body{background:#fff}
  .main{padding:0}
  section{display:block!important}
  .card{break-inside:avoid;border:1px solid #ccc}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

  const enc = S.deals.filter(enCours), sig = S.deals.filter(d=>d.statut==='Signé'), per = S.deals.filter(d=>d.statut==='Perdu');

    mrr: kSum(sig,d=>d.mensuel), caU: kSum(sig,d=>d.unique),
    ca1an: kSum(sig,d=>d.mensuel)*12 + kSum(sig,d=>d.unique),
    conv: (sig.length+per.length) ? sig.length/(sig.length+per.length) : 0,
    forecast: STATUTS_ENCOURS.reduce((a,st)=>a + kSum(S.deals.filter(d=>d.statut===st),d=>d.mensuel)*(S.params.probas[st]||0)/100, 0)
  };
}
function statsMois(annee){
  return Array.from({length:12},(_,m)=>{
    const dansMois = s => s && new Date(s+'T00:00').getFullYear()===annee && new Date(s+'T00:00').getMonth()===m;
    const contacts = S.deals.filter(d=>dansMois(d.dateContact)).length;
    const devis = S.deals.filter(d=>dansMois(d.dateDevis)).length;
    const sig = S.deals.filter(d=>d.statut==='Signé' && dansMois(d.dateDevis));
    const mrr = kSum(sig,d=>d.mensuel), un = kSum(sig,d=>d.unique);
    return {contacts, devis, signes:sig.length, mrr, unique:un, ca:mrr*12+un};
  });
}

  if(btn){ btn.style.background='var(--brique-p)'; btn.style.borderColor='var(--brique)'; btn.textContent='⏺'; }
  toast('🎤 Parlez… (re-cliquez sur le micro pour arrêter)');
  recVocal.onresult = ev => {
    let txt = '';
    for(let i=0;i<ev.results.length;i++) txt += ev.results[i][0].transcript;
    if(inp) inp.value = (base ? base+' ' : '') + txt.trim();
  };
  recVocal.onerror = () => { toast('Micro indisponible — vérifiez l\u2019autorisation du navigateur'); arreterDictee(); };
  recVocal.onend = arreterDictee;
  recVocal.start();
}
function arreterDictee(){
  const btn = document.getElementById('micbtn');
  if(btn){ btn.style.background=''; btn.style.borderColor=''; btn.textContent='🎤'; }
  recVocal = null;
}

/* ---------- Pièces jointes (Supabase Storage, privé par compte) ---------- */
function cheminFichier(dealId, nom){
  const propre = nom.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9._-]/g,'_');
  return SES.user_id + '/' + dealId + '/' + Date.now() + '-' + propre;
}
async function uploaderFichier(dealId, inp){
  const f = inp.files[0]; inp.value='';
  if(!f) return;
  if(!SES){ toast('Connectez-vous pour joindre des fichiers'); return; }
  if(f.size > 10*1024*1024){ toast('Fichier trop lourd (10 Mo maxi)'); return; }
  const d = getD(dealId);
  const chemin = cheminFichier(dealId, f.name);
  toast('⏳ Envoi de « '+f.name+' »…');
  try{
    const r = await fetch(CFG.url.replace(/\/$/,'') + '/storage/v1/object/fichiers/' + chemin,
      {method:'POST', headers:{'Authorization':'Bearer '+SES.access_token, 'apikey':CFG.key, 'x-upsert':'true', 'Content-Type': f.type || 'application/octet-stream'}, body: f});
    if(!r.ok){
      let msg=''; try{ const j=await r.json(); msg=j.message||j.error||''; }catch(e){}
      toast(/bucket/i.test(msg) || r.status===404
        ? 'Espace fichiers non installé — suivez le guide GUIDE-PIECES-JOINTES (2 min, une fois)'
        : 'Envoi refusé : '+(msg||r.status));
      return;
    }
    (d.fichiers = d.fichiers||[]).push({nom:f.name, chemin, taille:f.size, d:iso(AUJ())});
    journal(d, '📎 Pièce jointe ajoutée : '+f.name);
    sauver('Fichier joint'); render();
  }catch(e){ toast('Envoi impossible — vérifiez votre connexion'); }
}
async function ouvrirFichier(dealId, i){
  const f = getD(dealId).fichiers[i];
  toast('Ouverture de « '+f.nom+' »…');
  try{
    const r = await fetch(CFG.url.replace(/\/$/,'') + '/storage/v1/object/fichiers/' + f.chemin,
      {headers:{'Authorization':'Bearer '+SES.access_token, 'apikey':CFG.key}});
    if(!r.ok){ toast('Fichier introuvable ('+r.status+')'); return; }
    const blob = await r.blob();
    window.open(URL.createObjectURL(blob), '_blank');
  }catch(e){ toast('Ouverture impossible'); }
}
async function supprimerFichier(dealId, i){
  const d = getD(dealId), f = d.fichiers[i];
  try{
    await fetch(CFG.url.replace(/\/$/,'') + '/storage/v1/object/fichiers/' + f.chemin,
      {method:'DELETE', headers:{'Authorization':'Bearer '+SES.access_token, 'apikey':CFG.key}});
  }catch(e){}
  d.fichiers.splice(i,1);
  journal(d, '📎 Pièce jointe supprimée : '+f.nom);
  sauver('Fichier supprimé'); render();
}

const KCOUL = {'Prospection':'#7C90D8','Devis envoyé':'#E0A050','Relance':'#A450FB','En attente':'#9AA3B8','Signé':'#1E7A46','Perdu':'#B3261E'};
function vueKanban(){
  let base = S.deals;
  if(recherche){ const q=recherche.toLowerCase(); base=base.filter(d=>[d.client,d.contact,d.produit,d.commentaires].join(' ').toLowerCase().includes(q)); }
  return `<div class="kanban">` + TOUS_STATUTS.map(st=>{
    const cards = base.filter(d=>d.statut===st);
    const tot = kSum(cards, d=>d.mensuel);
    return `<div class="kcol" style="--kc:${KCOUL[st]}"
      ondragover="event.preventDefault();this.classList.add('dragover')"
      ondragleave="this.classList.remove('dragover')"
      ondrop="this.classList.remove('dragover');deposerCarte(event,'${st}')">
      <div class="khead"><b>${st.toUpperCase()}</b><small>${cards.length} · ${eur(tot)}/m</small></div>
      ${cards.length ? cards.map(d=>{
        const a = alerte(d);
        return `<div class="kcard" draggable="true" ondragstart="event.dataTransfer.setData('text/plain','${d.id}')" onclick="ficheDossier(${d.id})">
          <b>${esc(d.client)}</b>
          <small>${esc(d.produit||'—')}</small>
          <div class="m">${eur(d.mensuel)}/m${d.unique?' + '+eur(d.unique):''}</div>

    </div>`;
  }).join('') + `</div>
  <p style="color:var(--gris);font-size:.8rem;margin-top:8px">💡 Glissez-déposez les cartes d'une colonne à l'autre pour changer leur statut — comme sur HubSpot. Un clic ouvre la fiche.</p>`;
}
function deposerCarte(ev, st){
  const id = +ev.dataTransfer.getData('text/plain');
  const d = getD(id);
  if(!d || d.statut===st) return;
  if(st==='Perdu'){ perdre(id); return; }
  if(st==='Signé'){ signer(id); return; }
  d.statut = st; d.raisonPerte='';
  journal(d, 'Statut → '+st+' (pipeline)');
  sauver(d.client+' → '+st); render();
}

/* ================= VUE : MA SEMAINE (rapport d'activité) ================= */
let semOffset = 0;
function bornesSemaine(offset){
  const d = AUJ(); const jour = (d.getDay()+6)%7; // lundi=0
  const lundi = new Date(d); lundi.setDate(d.getDate()-jour+offset*7);
  const dim = new Date(lundi); dim.setDate(lundi.getDate()+6);
  return [iso(lundi), iso(dim)];
}
function evtsSemaine(deb, fin){
  return S.deals.flatMap(d=>(d.journal||[]).map(e=>({...e, client:d.client, did:d.id})))
    .filter(e=>e.d>=deb && e.d<=fin)
    .sort((a,b)=>((a.d||'')+(a.h||'')).localeCompare((b.d||'')+(b.h||'')));
}
function statsSemaine(deb, fin){
  const ev = evtsSemaine(deb, fin);
  const cpt = re => ev.filter(e=>re.test(e.t)).length;
  return {
    ev,
    relances: cpt(/^Relance n°/),
    emails: cpt(/^Email «/),
    crees: cpt(/^Dossier créé|^Importé depuis Pennylane/),
    signes: cpt(/SIGNÉ/),
    perdus: cpt(/PERDU/),
    notes: cpt(/^📝/),
    planifs: cpt(/^Relance planifiée/),
    total: ev.length
  };
}
function deltaTxt(a, b){
  const d = a-b;
  if(d>0) return `<small style="color:var(--sapin);font-weight:700">▲ +${d}</small>`;
  if(d<0) return `<small style="color:var(--brique);font-weight:700">▼ ${d}</small>`;
  return `<small style="color:var(--gris)">= stable</small>`;
}
function vSemaine(){
  charts.forEach(c=>c.destroy()); charts=[];
  const [deb, fin] = bornesSemaine(semOffset);
  const [pdeb, pfin] = bornesSemaine(semOffset-1);
  const s = statsSemaine(deb, fin), p = statsSemaine(pdeb, pfin);
  const sigSem = S.deals.filter(d=>d.statut==='Signé' && (d.journal||[]).some(e=>/SIGNÉ/.test(e.t) && e.d>=deb && e.d<=fin));
  const caSem = kSum(sigSem,d=>d.mensuel)*12 + kSum(sigSem,d=>d.unique);
  const jours = {}; s.ev.forEach(e=>{ (jours[e.d]=jours[e.d]||[]).push(e); });
  document.getElementById('main').innerHTML = `
  <div class="topbar"><div><h1>Ma semaine</h1><div class="date">du ${fmtD(deb)} au ${fmtD(fin)}${semOffset===0?' (semaine en cours)':''}</div></div>
  <div class="actions">
    <button class="btn btn-o" onclick="semOffset--;render()">‹ Précédente</button>
    ${semOffset<0?`<button class="btn btn-o" onclick="semOffset++;render()">Suivante ›</button>`:''}
    ${semOffset!==0?`<button class="btn btn-ghost" onclick="semOffset=0;render()">Aujourd'hui</button>`:''}
    <button class="btn btn-p" onclick="window.print()">🖨 Export PDF du rapport</button></div></div>
  <div class="card"><h2>CE QUE J'AI FAIT CETTE SEMAINE (vs semaine précédente)</h2>
    <div class="kpis" style="margin:0">
      <div class="kpi"><label>Relances effectuées</label><div class="v orange">${s.relances}</div>${deltaTxt(s.relances,p.relances)}</div>
      <div class="kpi"><label>Emails envoyés</label><div class="v">${s.emails}</div>${deltaTxt(s.emails,p.emails)}</div>
      <div class="kpi"><label>Dossiers créés</label><div class="v">${s.crees}</div>${deltaTxt(s.crees,p.crees)}</div>
      <div class="kpi"><label>Deals signés</label><div class="v vert">${s.signes}</div>${deltaTxt(s.signes,p.signes)}</div>
      <div class="kpi"><label>CA 1ère année signé</label><div class="v vert">${eur(caSem)}</div></div>
      <div class="kpi"><label>Perdus</label><div class="v rouge">${s.perdus}</div></div>
      <div class="kpi"><label>Notes & planifs</label><div class="v">${s.notes+s.planifs}</div></div>
      <div class="kpi"><label>Actions totales</label><div class="v">${s.total}</div>${deltaTxt(s.total,p.total)}</div>
    </div></div>
  <div class="card"><h2>LE DÉTAIL, JOUR PAR JOUR — votre justificatif d'activité</h2>
    ${Object.keys(jours).length ? Object.keys(jours).sort().map(j=>`
      <div style="margin-bottom:10px">
        <div style="font-weight:700;color:var(--encre);text-transform:capitalize;border-bottom:2px solid var(--trait);padding-bottom:3px;margin-bottom:4px">${new Date(j+'T00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</div>
        ${jours[j].map(e=>`<div style="font-size:.86rem;padding:3px 0"><span class="mono" style="color:var(--gris)">${e.h||'—'}</span> · <b style="cursor:pointer" onclick="ficheDossier(${e.did})">${esc(e.client)}</b> — ${esc(e.t)}</div>`).join('')}
      </div>`).join('')
    : '<p style="color:var(--gris)">Aucune action enregistrée sur cette semaine.</p>'}
  </div>`;
}

let charts = [];
function chart(id, cfg){ const c=new Chart(document.getElementById(id),cfg); charts.push(c); }
function vPilotage(){
  charts.forEach(c=>c.destroy()); charts=[];
  const st = statsGlobales();
  const devisEmis = S.deals.filter(d=>d.dateDevis).length;
  const parStatut = TOUS_STATUTS.map(s=>({s, n:S.deals.filter(d=>d.statut===s).length, m:kSum(S.deals.filter(d=>d.statut===s),d=>d.mensuel)}));
  const parProduit = S.params.produits.map(p=>({p, n:S.deals.filter(d=>d.produit===p).length})).filter(x=>x.n>0);
  const parOrigine = S.params.origines.map(o=>{
    const ds=S.deals.filter(d=>d.origine===o);
    return {o, n:ds.length, sig:ds.filter(d=>d.statut==='Signé').length};
  }).filter(x=>x.n>0);
  const parRaison = S.params.raisons.map(r=>{
    const ds=S.deals.filter(d=>d.statut==='Perdu'&&d.raisonPerte===r);
    return {r, n:ds.length, m:kSum(ds,d=>d.mensuel), u:kSum(ds,d=>d.unique)};

function barre(pc){
  const cls = pc>=100?'':pc>=70?'mid':'low';
  return `<div class="bar ${cls}"><i style="width:${Math.min(pc,100)}%"></i></div>`;
}
function moisDetail(m){
  const an = S.annee;
  const dans = s => s && new Date(s+'T00:00').getFullYear()===an && new Date(s+'T00:00').getMonth()===m;
  const contacts = S.deals.filter(d=>dans(d.dateContact));
  const devisMois = S.deals.filter(d=>dans(d.dateDevis));
  const signes = devisMois.filter(d=>d.statut==='Signé');
  const enAttente = devisMois.filter(d=>['Devis envoyé','Relance','En attente'].includes(d.statut));
  const bloc = (titre, arr, couleur) => `
    <label style="font-size:.72rem;font-weight:700;color:${couleur};text-transform:uppercase">${titre} (${arr.length})</label>
    ${arr.length?`<div class="plist" style="margin:5px 0 12px">${arr.map(d=>`
      <div class="pitem" style="cursor:pointer" onclick="ficheDossier(${d.id})">
        <span><b>${esc(d.client)}</b> — ${esc(d.produit||'—')}<br>
        <small style="color:var(--gris)">${eur(d.mensuel)}/mois${d.unique?' + '+eur(d.unique):''} · ${esc(d.statut)}</small></span>
        <span style="color:var(--gris)">›</span></div>`).join('')}</div>`
    :'<p style="color:var(--gris);font-size:.83rem;margin:4px 0 12px">Aucun.</p>'}`;
  formModal(`${MOIS[m].charAt(0).toUpperCase()+MOIS[m].slice(1)} ${an} — le détail`, `
    ${bloc('✅ Signés dans le mois', signes, 'var(--sapin)')}
    ${bloc('⏳ Devis du mois encore en attente', enAttente, 'var(--ambre)')}
    ${bloc('🆕 Nouveaux contacts du mois', contacts, 'var(--flamme)')}
  `, ()=>{}, 'Fermer');
}

function exporterCSV(){

    .map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(';'));

/* ---------- Doublons clients : détection & fusion ---------- */
function detecterDoublons(){
  const groupes = [];
  const vus = new Set();
  S.clients.forEach(a=>{
    if(vus.has(a.id)) return;
    const g = [a];
    S.clients.forEach(b=>{
      if(b.id===a.id || vus.has(b.id)) return;
      const na = normNom(a.nom), nb = normNom(b.nom);
      const memeNom = na && nb && (na===nb || (na.length>=4 && nb.includes(na)) || (nb.length>=4 && na.includes(nb)));
      const memeEmail = a.email && b.email && a.email.toLowerCase()===b.email.toLowerCase();
      if(memeNom || memeEmail) g.push(b);
    });
    if(g.length>1){ g.forEach(c=>vus.add(c.id)); groupes.push(g); }
  });
  return groupes;
}
function ecranDoublons(){
  const groupes = detecterDoublons();
  formModal('🧬 Doublons clients', groupes.length ? `
    <p style="font-size:.85rem;color:var(--gris);margin-bottom:10px">${groupes.length} groupe(s) de fiches qui semblent désigner le même client. La fusion garde la fiche la plus complète, réattache tous les devis, et supprime les autres fiches. Rien n'est perdu.</p>
    ${groupes.map((g,gi)=>`<div class="plist" style="margin-bottom:12px">
      ${g.map(c=>{const s=statsClient(c);return `<div class="pitem"><span><b>${esc(c.nom)}</b><br><small style="color:var(--gris)">${esc([c.contact,c.email,c.tel].filter(Boolean).join(' · ')||'—')} · ${s.nb} devis</small></span></div>`;}).join('')}
      <div class="actions"><button class="btn btn-p" style="padding:7px 12px" onclick="fusionnerGroupe(${gi})">🧬 Fusionner ces ${g.length} fiches</button></div>
    </div>`).join('')}` : '<p style="color:var(--gris)">Aucun doublon détecté — votre fichier clients est propre. 👍</p>',
    ()=>{}, 'Fermer');
  window._groupesDoublons = groupes;
}
function fusionnerGroupe(gi){
  const g = window._groupesDoublons[gi];
  if(!g) return;
  // fiche gardée = la plus complète (le plus de champs remplis, puis le plus de devis)
  const score = c => ['contact','email','tel','notes'].filter(k=>c[k]).length*10 + statsClient(c).nb;
  const garde = [...g].sort((a,b)=>score(b)-score(a))[0];
  g.forEach(c=>{
    if(c.id===garde.id) return;
    ['contact','email','tel','notes'].forEach(k=>{ if(!garde[k] && c[k]) garde[k]=c[k]; });
    S.deals.forEach(d=>{ if(d.clientId===c.id || d.client===c.nom){ d.clientId=garde.id; d.client=garde.nom; } });
    S.clients = S.clients.filter(x=>x.id!==c.id);
  });
  // on rattache aussi formellement les devis de la fiche conservée (anciennes lignes sans identifiant)
  S.deals.forEach(d=>{ if(d.client===garde.nom) d.clientId = garde.id; });
  sauver('Fiches fusionnées sous « '+garde.nom+' »');
  ecranDoublons(); render();
}
function importerClients(inp){
  const f=inp.files[0]; if(!f) return;
  const lire = rows => { inp.value=''; mapperColonnes(rows.filter(r=>r && r.some(x=>String(x||'').trim()))); };
  if(/\.csv$/i.test(f.name)){
    const r=new FileReader();
    r.onload=()=>lire(r.result.split(/\r?\n/).map(l=>l.split(/[;,\t]/)));
    r.readAsText(f);
  } else {
    const r=new FileReader();
    r.onload=()=>{ try{
      const wbk=XLSX.read(new Uint8Array(r.result),{type:'array'});
      lire(XLSX.utils.sheet_to_json(wbk.Sheets[wbk.SheetNames[0]],{header:1}));
    }catch(e){ toast('Fichier illisible — utilisez un .xlsx ou un .csv'); } };
    r.readAsArrayBuffer(f);
  }
}
function mapperColonnes(rows){
  if(!rows.length){ toast('Fichier vide'); return; }
  const nbCol = Math.max(...rows.slice(0,10).map(r=>r.length));
  const h = (rows[0]||[]).map(x=>String(x||'').trim());
  const lettres = i => String.fromCharCode(65+i);
  // détection automatique proposée par défaut
  const auto = re => h.findIndex(x=>re.test(x.toLowerCase()));
  const dNom = auto(/nom|entreprise|soci|client|raison/), dMail = auto(/mail|courriel/),
        dCont = auto(/contact|interlocuteur|prenom|prénom/), dTel = auto(/t[eé]l|phone|portable/);
  const enTetes = dNom>-1 || dMail>-1;
  const optCols = (sel) => `<option value="-1">— ignorer —</option>` +
    Array.from({length:nbCol},(_,i)=>`<option value="${i}" ${i===sel?'selected':''}>Colonne ${lettres(i)}${h[i]?` — « ${esc(h[i].slice(0,25))} »`:''}</option>`).join('');
  const apercu = rows.slice(enTetes?1:0, (enTetes?1:0)+3);
  formModal('Importer des clients — associez les colonnes', `
    <p style="font-size:.85rem;color:var(--gris);margin-bottom:12px">Fichier lu : <b>${rows.length - (enTetes?1:0)} ligne(s)</b>. Indiquez quelle colonne correspond à quoi (seul le nom est obligatoire).</p>
    <div class="fgrid">
      <div class="f"><label>Nom / entreprise *</label><select id="map_nom">${optCols(dNom>-1?dNom:0)}</select></div>
      <div class="f"><label>Email</label><select id="map_mail">${optCols(dMail)}</select></div>
      <div class="f"><label>Contact</label><select id="map_cont">${optCols(dCont)}</select></div>
      <div class="f"><label>Téléphone</label><select id="map_tel">${optCols(dTel)}</select></div>
      <div class="f full" style="flex-direction:row;align-items:center;gap:8px">
        <input type="checkbox" id="map_ent" ${enTetes?'checked':''} style="width:auto"> <label for="map_ent" style="text-transform:none;font-weight:500;font-size:.85rem">La 1ère ligne du fichier contient les titres de colonnes (ne pas l'importer)</label></div>
    </div>
    <div style="margin-top:12px;overflow-x:auto"><table style="font-size:.8rem">
      <tr>${Array.from({length:Math.min(nbCol,6)},(_,i)=>`<th>Col. ${lettres(i)}</th>`).join('')}</tr>
      ${apercu.map(r=>`<tr>${Array.from({length:Math.min(nbCol,6)},(_,i)=>`<td>${esc(String(r[i]||'').slice(0,22))}</td>`).join('')}</tr>`).join('')}
    </table><p style="font-size:.75rem;color:var(--gris);margin-top:4px">Aperçu des premières lignes${nbCol>6?' (6 premières colonnes affichées)':''}.</p></div>`,
    ()=>{
      const g = id => +document.getElementById(id).value;
      const iNom=g('map_nom'), iMail=g('map_mail'), iCont=g('map_cont'), iTel=g('map_tel');
      if(iNom<0){ toast('Choisissez la colonne du nom'); return false; }
      const start = document.getElementById('map_ent').checked ? 1 : 0;
      let ajout=0, doublons=0, vides=0;
      for(let i=start;i<rows.length;i++){
        const val = j => j>-1 ? String(rows[i][j]||'').trim() : '';
        const nom = val(iNom);
        if(!nom){ vides++; continue; }
        if(S.clients.some(c=>c.nom.toLowerCase()===nom.toLowerCase())){ doublons++; continue; }
        S.clients.push({id:S.nextClientId++, nom, contact:val(iCont), email:val(iMail), tel:val(iTel), notes:''});
        ajout++;
      }
      sauver(`Import terminé : ${ajout} client(s) ajouté(s)${doublons?`, ${doublons} doublon(s) ignoré(s)`:''}${vides?`, ${vides} ligne(s) sans nom`:''}`);
    }, 'Importer');
}

let verrou=false, derniereActivite=Date.now();
async function hashPin(p){
  const b=await crypto.subtle.digest('SHA-256', new TextEncoder().encode('aloa:'+p));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function pinActif(){ return !!(lsGet('aloa_pin') || (S&&S.pinHash)); }
/* ---------- Historique versionné ---------- */
function prendreSnapshot(force){
  try{
    if(!S) return;
    S.snapshots = S.snapshots || [];
    const auj = iso(AUJ());
    if(!force && S.snapshots.some(s=>s.d===auj)) return; // un par jour maxi en auto
    const coeur = {...S}; delete coeur.snapshots;
    S.snapshots.push({d:auj, h:new Date().toTimeString().slice(0,5), data:JSON.stringify(coeur)});
    while(S.snapshots.length > 14) S.snapshots.shift();
    if(force){ sauver('Instantané enregistré'); render(); }
  }catch(e){}
}
function restaurerSnapshot(i){
  const snap = S.snapshots[i];
  formModal('Restaurer les données du ' + fmtD(snap.d) + ' ?', `
    <p>Toutes vos données actuelles (dossiers, clients, objectifs, paramètres) seront remplacées par l'état du <b>${fmtD(snap.d)} à ${esc(snap.h||'')}</b>.<br><br>
    Par sécurité, un instantané de l'état ACTUEL sera pris juste avant, pour pouvoir revenir en arrière.</p>`,
    ()=>{
      prendreSnapshot(true);
      const historique = S.snapshots;
      S = JSON.parse(snap.data);
      S.snapshots = historique;
      sauver('Données restaurées au ' + fmtD(snap.d));
    }, 'Restaurer');
}
/* ---------- Notifications de relance ---------- */
function notifierRelances(){
  try{
    if(!S || !S.notif || typeof Notification==='undefined' || Notification.permission!=='granted') return;
    if(lsGet('aloa_notif_jour')===iso(AUJ())) return; // une seule fois par jour et par poste
    const n = aFaire().length;
    if(!n) return;
    lsSet('aloa_notif_jour', iso(AUJ()));
    const img = document.querySelector && document.querySelector('.brand img');
    new Notification('ALOA Informatique — Suivi commercial', {
      body: '🔥 ' + n + ' relance' + (n>1?'s':'') + ' à faire aujourd\u2019hui',
      icon: img ? img.src : undefined
    });
  }catch(e){}
}
async function activerNotifs(){
  try{
    if(typeof Notification==='undefined'){ toast('Notifications non supportées par ce navigateur'); return; }
    const p = await Notification.requestPermission();
    if(p==='granted'){ S.notif = true; sauver('Notifications activées'); lsSet('aloa_notif_jour', null); notifierRelances(); render(); }
    else toast('Permission refusée — autorisez les notifications pour ce site dans le navigateur');
  }catch(e){ toast('Activation impossible'); }
}

async function essaiPin(inp, force){
  if(inp.value.length<4) return;
  const h=await hashPin(inp.value);
  const ref=(S&&S.pinHash)||lsGet('aloa_pin');
  if(h===ref){ verrou=false; derniereActivite=Date.now(); const el=document.getElementById('lock'); if(el)el.remove(); return; }
  // pendant la frappe on ne dit rien : le code n'est peut-être pas fini d'être tapé
  if(force || inp.value.length>=8){
    const e=document.getElementById('pin_err'); if(e)e.textContent='Code incorrect';
    inp.value=''; inp.focus();
  }
}
function definirPin(){
  formModal(pinActif()?'Modifier le code PIN':'Définir un code PIN', `
    <p style="font-size:.85rem;color:var(--gris);margin-bottom:12px">Le code sera demandé à chaque ouverture et après 5 minutes d'inactivité. Il est valable sur tous vos appareils connectés au même compte.</p>
    <div class="f full"><label>Nouveau code (4 à 8 chiffres)</label><input id="pin_new" type="password" inputmode="numeric" maxlength="8"></div>`,
    async ()=>{
      const p=document.getElementById('pin_new').value;
      if(!/^\d{4,8}$/.test(p)){ toast('4 à 8 chiffres uniquement'); return false; }
      const h=await hashPin(p);
      S.pinHash=h; lsSet('aloa_pin',h); sauver('Code PIN activé');
    });
}
function retirerPin(){
  formModal('Désactiver le code PIN', `<p>L'application s'ouvrira sans code.</p>`,
    ()=>{ S.pinHash=''; lsSet('aloa_pin',null); localStorage.removeItem('aloa_pin'); sauver('Code PIN désactivé'); }, 'Désactiver');
}
function demarrerVerrou(){
  if(pinActif()) ecranVerrou();
  ['click','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,()=>{ if(!verrou) derniereActivite=Date.now(); },true));
  setInterval(()=>{ if(pinActif() && !verrou && Date.now()-derniereActivite > 5*60*1000) ecranVerrou(); }, 10000);
}

/* ---------- PENNYLANE ---------- */
const FN_PENNYLANE = () => CFG.url.replace(/\/$/,'') + '/functions/v1/pennylane';
async function plAppel(params){
  const r = await fetch(FN_PENNYLANE() + '?' + new URLSearchParams(params), {
    headers: { 'Authorization': 'Bearer ' + (SES ? SES.access_token : ''), 'apikey': CFG.key }
  });
  if(r.status===404) throw new Error('NOFN');
  const j = await r.json();
  if(!r.ok) throw new Error(j.error || 'Erreur Pennylane');
  return j;
}
function emailDe(d){
  const c = S.clients.find(x=>x.id===d.clientId || x.nom===d.client);
  if(c && c.email) return c.email;
  const m = (d.coord||'').match(/[\w.+-]+@[\w-]+\.[\w.]+/);
  return m ? m[0] : '';
}
function ouvrirEmail(dealId, modele){
  const d = getD(dealId);
  const email = emailDe(d);
  if(!email){ toast('Aucun email pour ce client — ajoutez-le dans sa fiche'); return; }
  const t = S.params.emails[modele] || S.params.emails.relance;
  const rempl = s => s.replace(/{client}/g, d.client).replace(/{contact}/g, d.contact||'').replace(/{produit}/g, d.produit||'notre proposition').replace(/{montant}/g, String(d.mensuel||''));
  journal(d, 'Email « '+modele+' » ouvert dans Outlook'); sauver();
  window.location.href = 'mailto:' + encodeURIComponent(email) + '?subject=' + encodeURIComponent(rempl(t.objet)) + '&body=' + encodeURIComponent(rempl(t.corps));
}
function ouvrirPennylane(dealId){
  const d = getD(dealId);
  if(d.pennylane && d.pennylane.id){
    formModal(`Devis Pennylane — ${esc(d.client)}`, `
      <p style="margin-bottom:6px">Devis lié : <b>${esc(d.pennylane.numero)}</b>${d.pennylane.montant?` — ${esc(String(d.pennylane.montant))} €`:''}</p>
      <div class="actions" style="margin-top:12px">
        <button class="btn btn-p" onclick="voirPdfPennylane(${dealId})">📄 Ouvrir le PDF</button>
        <button class="btn btn-o" onclick="fermer();chercherPennylane(${dealId})">Changer de devis</button>
        <button class="btn btn-ghost" onclick="delierPennylane(${dealId})">Délier</button>
      </div>`, ()=>{}, 'Fermer');
    return;
  }
  chercherPennylane(dealId);
}
async function voirPdfPennylane(dealId){
  const d = getD(dealId);
  toast('Ouverture du devis ' + d.pennylane.numero + '…');
  try{
    // on passe par fetch pour joindre le jeton de connexion (un onglet ouvert directement ne le peut pas)
    const r = await fetch(FN_PENNYLANE() + '?' + new URLSearchParams({mode:'pdf', id:d.pennylane.id}),
      { headers: { 'Authorization': 'Bearer ' + (SES ? SES.access_token : ''), 'apikey': CFG.key } });
    if(!r.ok){
      let msg = 'Erreur ' + r.status;
      try{ const j = await r.json(); msg = j.error || j.message || msg; }catch(e){}
      toast('PDF : ' + msg); return;
    }
    const blob = await r.blob();
    window.open(URL.createObjectURL(blob), '_blank');
  }catch(e){ toast('PDF injoignable — vérifiez votre connexion'); }
}
function delierPennylane(dealId){
  const d = getD(dealId); d.pennylane = null;
  sauver('Devis Pennylane délié'); fermer(); render();
}

    ()=>{}, 'Fermer');

async function lancerRecherchePl(dealId){
  const box = document.getElementById('pl_res');
  const q = document.getElementById('pl_q').value.trim();
  if(box) box.innerHTML = '<p style="color:var(--gris)">⏳ Interrogation de Pennylane…</p>';
  try{
    const j = await plAppel({mode:'liste', q});
    if(!box) return;
    if(!j.devis.length){
      box.innerHTML = '<p style="color:var(--gris)">Aucun devis trouvé pour « '+esc(q)+' ». Essayez un mot plus court (ex. « RONDEAU »), ou lancez le diagnostic :</p>'
        + '<div class="actions" style="margin-top:8px"><button class="btn btn-o" onclick="diagPennylane()">🔧 Diagnostic de la liaison</button></div><div id="pl_diag"></div>';
      return;
    }
    box.innerHTML = '<div class="plist">' + j.devis.map(dv=>`
      <div class="pitem"><span><b>${esc(dv.numero)}</b> — ${esc(dv.client)}<br>
      <small style="color:var(--gris)">${dv.date?esc(String(dv.date).slice(0,10)):''} ${dv.montant?'· '+esc(String(dv.montant))+' €':''} ${dv.statut?'· '+esc(dv.statut):''}</small></span>
      <button class="btn btn-p" onclick='lierPennylane(${dealId}, ${JSON.stringify(dv).replace(/'/g,"&#39;")})'>Lier</button></div>`).join('') + '</div>';
  }catch(e){
    if(!box) return;
    box.innerHTML = e.message==='NOFN'
      ? '<p style="color:var(--brique)">La fonction relais n\u2019est pas encore installée sur votre Supabase.<br>Suivez le guide « GUIDE-PENNYLANE » fourni avec l\u2019application (10 min, une seule fois).</p>'
      : '<p style="color:var(--brique)">Erreur : '+esc(e.message)+'</p>';
  }
}
async function diagPennylane(){
  const box = document.getElementById('pl_diag');
  if(box) box.innerHTML = '<p style="color:var(--gris)">⏳ Analyse…</p>';
  try{
    const j = await plAppel({mode:'diag'});
    if(!box) return;
    if(j.version !== 2){
      box.innerHTML = '<p style="color:var(--brique)"><b>La fonction installée dans Supabase est une ancienne version.</b><br>Edge Functions → pennylane → remplacez le code par le fichier pennylane-function.ts fourni → Deploy.</p>';
      return;
    }
    box.innerHTML = `<div class="note" style="margin-top:10px;font-size:.82rem">
      <b>Devis récupérés :</b> ${j.devis_recuperes} — <b>Clients dans l'annuaire :</b> ${j.clients_annuaire}<br>
      ${j.clients_annuaire===0 ? '⚠️ <b>Annuaire vide</b> : ajoutez le scope <b>customers:readonly</b> à votre token Pennylane (Paramètres → Connectivité → API), puis mettez à jour le secret si vous avez recréé le token.<br>' : ''}
      ${j.devis_recuperes===0 ? '⚠️ <b>Aucun devis reçu</b> : vérifiez le scope <b>quotes:readonly</b> du token.<br>' : ''}
      <details style="margin-top:6px"><summary>Détails techniques (à me transmettre si besoin)</summary>
      <pre style="white-space:pre-wrap;font-size:.72rem">${esc(JSON.stringify({champs:j.champs_du_premier_devis, extrait:j.extrait_premier_devis},null,1))}</pre></details>
    </div>`;
  }catch(e){ if(box) box.innerHTML = '<p style="color:var(--brique)">Diagnostic impossible : '+esc(e.message)+'</p>'; }

function lierPennylane(dealId, dv){
  const d = getD(dealId);
  d.pennylane = {id:dv.id, numero:dv.numero, montant:dv.montant, date:dv.date};
  sauver('Devis « '+dv.numero+' » lié au dossier'); fermer(); render();
}
/* ---------- SYNC PENNYLANE : importer MES devis ---------- */
const normNom = s => String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\b(sarl|sas|sasu|eurl|sci|sa|scop|ei)\b/g,'').replace(/[^a-z0-9]/g,' ').trim();
function clientConnu(nomPl){
  const n = normNom(nomPl);
  if(n.length < 3) return null;
  return S.clients.find(c=>{
    const m = normNom(c.nom);
    return m && (m===n || (m.length>=4 && n.includes(m)) || (n.length>=4 && m.includes(n)));
  }) || null;
}
async function syncPennylane(){
  formModal('⟳ Synchronisation Pennylane — mes devis', `
    <p style="font-size:.85rem;color:var(--gris)">Tous les devis Pennylane (non encore liés) sont listés ci-dessous. Cochez ceux qui sont à vous, validez : les fiches sont créées, prêtes à compléter. Ceux qui correspondent à vos clients${S.params.plMarqueur?` ou à votre marqueur « <b>${esc(S.params.plMarqueur)}</b> »`:''} sont pré-cochés pour vous.</p>
    <div class="actions" style="margin-top:8px"><button class="btn btn-o" style="padding:6px 11px;font-size:.78rem" onclick="cocherToutPl(true)">Tout cocher</button><button class="btn btn-o" style="padding:6px 11px;font-size:.78rem" onclick="cocherToutPl(false)">Tout décocher</button></div>
    <div id="sync_res" style="max-height:320px;overflow:auto;margin-top:10px"><p style="color:var(--gris)">⏳ Récupération des devis Pennylane…</p></div>`,
    ()=>{ importerSelectionPl(); return false; }, 'Importer la sélection');
  try{
    const j = await plAppel({mode:'liste', n:300});
    const dejaLies = new Set(S.deals.filter(d=>d.pennylane).map(d=>String(d.pennylane.id)));
    const mq = (S.params.plMarqueur||'').toLowerCase();
    const candidats = j.devis
      .filter(dv=>!dejaLies.has(String(dv.id)))
      .map(dv=>{
        const cl = clientConnu(dv.client);
        const marque = mq && ((dv.libelle||'')+' '+(dv.numero||'')).toLowerCase().includes(mq);
        return {...dv, _client:cl, _marque:marque, _coche: !!cl || marque};
      });
    window._syncCandidats = candidats;
    // statuts Pennylane des devis DÉJÀ liés : proposer les bascules
    const basculer = [];
    S.deals.filter(d=>d.pennylane).forEach(d=>{
      const dv = j.devis.find(x=>String(x.id)===String(d.pennylane.id));
      if(!dv || !dv.statut) return;
      const st = String(dv.statut).toLowerCase();
      if(/accept|signed|won/.test(st) && d.statut!=='Signé') basculer.push({d, vers:'Signé', pl:dv.statut});
      else if(/refus|denied|declin|reject|lost/.test(st) && d.statut!=='Perdu') basculer.push({d, vers:'Perdu', pl:dv.statut});
    });
    window._syncBascules = basculer;
    const box = document.getElementById('sync_res');
    if(!box) return;
    let htmlBascules = '';
    if(basculer.length){
      htmlBascules = '<label style="font-size:.72rem;font-weight:700;color:var(--sapin);text-transform:uppercase">Pennylane a tranché — mettre à jour ?</label><div class="plist" style="margin:5px 0 12px">'
        + basculer.map((b,i)=>`<div class="pitem"><input type="checkbox" id="basc_${i}" checked style="width:17px;height:17px;accent-color:var(--flamme)">
          <span><b>${esc(b.d.client)}</b> — devis ${esc(b.d.pennylane.numero)}<br>
          <small style="color:var(--gris)">Statut Pennylane : « ${esc(b.pl)} » → passer le dossier en <b style="color:${b.vers==='Signé'?'var(--sapin)':'var(--brique)'}">${b.vers}</b></small></span></div>`).join('')
        + '</div>';
    }
    if(!candidats.length && !basculer.length){
      box.innerHTML = '<p style="color:var(--gris)">Aucun nouveau devis et aucun changement de statut : tout est à jour. 👍</p>';
      return;
    }
    box.innerHTML = htmlBascules + (candidats.length?'<label style="font-size:.72rem;font-weight:700;color:var(--gris);text-transform:uppercase">Nouveaux devis à importer</label>':'') + '<div class="plist" style="margin-top:5px">' + candidats.map((dv,i)=>`
      <div class="pitem"><input type="checkbox" id="sync_${i}" ${dv._coche?'checked':''} style="width:17px;height:17px;accent-color:var(--flamme)">
      <span><b>${esc(dv.numero)}</b> — ${esc(dv.client)}<br>
      <small style="color:var(--gris)">${dv.date?esc(String(dv.date).slice(0,10)):''} ${dv.montant?'· '+esc(String(dv.montant))+' €':''} ${dv._client?'· ✓ client connu ('+esc(dv._client.nom)+')':''} ${dv._marque?'· 🏷 marqueur':''}</small></span></div>`).join('') + '</div>';
  }catch(e){
    const box = document.getElementById('sync_res');
    if(box) box.innerHTML = '<p style="color:var(--brique)">'+(e.message==='NOFN'?'Fonction relais non installée — voir GUIDE-PENNYLANE (et redéployez la dernière version du fichier pennylane-function.ts).':'Erreur : '+esc(e.message))+'</p>';
  }
}
function cocherToutPl(etat){
  (window._syncCandidats||[]).forEach((dv,i)=>{ const cb=document.getElementById('sync_'+i); if(cb) cb.checked=etat; });
}
function importerSelectionPl(){
  // 1) bascules de statut validées
  let nb = 0;
  (window._syncBascules||[]).forEach((b,i)=>{
    const cb = document.getElementById('basc_'+i);
    if(!cb || !cb.checked) return;
    if(b.vers==='Signé'){ b.d.statut='Signé'; b.d.prochaineRelance=''; journal(b.d,'Devis SIGNÉ 🎉 (statut Pennylane : '+b.pl+')'); }
    else { b.d.statut='Perdu'; b.d.prochaineRelance=''; b.d.raisonPerte='Refusé sur Pennylane'; journal(b.d,'Marqué PERDU (statut Pennylane : '+b.pl+')'); }
    nb++;
  });
  const cands = window._syncCandidats || [];
  let n = 0;
  cands.forEach((dv,i)=>{
    const cb = document.getElementById('sync_'+i);
    if(!cb || !cb.checked) return;
    let cl = dv._client;
    if(!cl){
      cl = {id:S.nextClientId++, nom:dv.client||('Client devis '+dv.numero), contact:'', email:'', tel:'', notes:'Créé par la synchro Pennylane'};
      S.clients.push(cl);
    }
    const dateDevis = dv.date ? String(dv.date).slice(0,10) : iso(AUJ());
    S.deals.push({
      id:S.nextId++, client:cl.nom, clientId:cl.id, contact:cl.contact, coord:[cl.email,cl.tel].filter(Boolean).join(' · '),
      origine:'Portefeuille cabinet', produit:'Devis Pennylane '+dv.numero,
      mensuel:0, unique:parseFloat(dv.montant)||0, statut:'Devis envoyé',
      dateContact:dateDevis, dateDevis:dateDevis, derniereRelance:'', nbRelances:0,
      prochaineRelance:plusJours(dateDevis,7), prochaineAction:'À compléter : produit, contact, mensuel/unique', commentaires:'Importé depuis Pennylane — fiche à compléter',
      raisonPerte:'', pennylane:{id:dv.id, numero:dv.numero, montant:dv.montant, date:dv.date},
      journal:[{d:iso(AUJ()), h:new Date().toTimeString().slice(0,5), t:'Importé depuis Pennylane ('+dv.numero+') — relance auto au '+fmtD(plusJours(dateDevis,7))}]
    });
    n++;
  });
  if(n || nb){
    const msg = [n?n+' devis importé(s)':'', nb?nb+' statut(s) mis à jour':''].filter(Boolean).join(' · ');
    sauver(msg); fermer(); render();
  } else toast('Aucune case cochée');
}
function copierLienConfig(){
  const b64 = btoa(JSON.stringify({url:CFG.url, key:CFG.key})).replace(/\+/g,'-').replace(/\//g,'_');
  const lien = location.origin + location.pathname + '#cfg=' + b64;
  const fin = ok => toast(ok ? 'Lien copié — collez-le sur votre autre appareil' : 'Copie impossible — sélectionnez et copiez : ' + lien);
  if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(lien).then(()=>fin(true),()=>fin(false));
  else fin(false);
}

function ouvrirPalette(){
  let el = document.getElementById('palette');
  if(!el){ el = document.createElement('div'); el.id='palette'; document.body.appendChild(el); }
  el.style.display = 'flex';
  el.innerHTML = `<div class="palcard">
    <input id="pal_in" placeholder="Rechercher un client, un dossier, une note…" oninput="chercherPalette(this.value)" onkeydown="clavierPalette(event)">
    <div class="palres" id="pal_res"></div>
    <div class="palfoot">↵ ouvrir le 1er résultat · Échap fermer</div>
  </div>`;
  el.onclick = e => { if(e.target===el) fermerPalette(); };
  setTimeout(()=>{ const i=document.getElementById('pal_in'); if(i) i.focus(); }, 30);
  chercherPalette('');
}
function fermerPalette(){ const el=document.getElementById('palette'); if(el) el.style.display='none'; }
function chercherPalette(q){
  const box = document.getElementById('pal_res');
  if(!box) return;
  q = (q||'').trim().toLowerCase();
  const res = [];
  S.clients.forEach(c=>{
    if(!q || [c.nom,c.contact,c.email,c.tel].join(' ').toLowerCase().includes(q))
      res.push({typ:'Client', coul:'var(--flamme)', fond:'var(--bleu-p)', titre:c.nom, sous:[c.contact,c.email].filter(Boolean).join(' · '), act:`fermerPalette();ficheClient(${c.id})`});
  });
  S.deals.forEach(d=>{
    if(!q || [d.client,d.produit,d.commentaires,d.statut].join(' ').toLowerCase().includes(q))
      res.push({typ:d.statut, coul:d.statut==='Signé'?'var(--sapin)':d.statut==='Perdu'?'var(--brique)':'var(--encre)', fond:'var(--carte2)', titre:d.client+' — '+(d.produit||'dossier'), sous:eur(d.mensuel)+'/mois'+(d.unique?' + '+eur(d.unique):''), act:`fermerPalette();ficheDossier(${d.id})`});
  });
  if(q) S.deals.forEach(d=>(d.journal||[]).forEach(e=>{
    if(e.t.toLowerCase().includes(q))
      res.push({typ:'Journal', coul:'var(--gris)', fond:'var(--carte2)', titre:e.t.slice(0,60), sous:d.client+' · '+fmtD(e.d), act:`fermerPalette();ficheDossier(${d.id})`});
  }));
  const top = res.slice(0, 12);
  box.innerHTML = top.length
    ? top.map((r,i)=>`<button class="${i===0?'hl':''}" onclick="${r.act}"><span class="typ" style="color:${r.coul};background:${r.fond}">${esc(r.typ)}</span><span style="flex:1"><b>${esc(r.titre)}</b><small>${esc(r.sous||'')}</small></span></button>`).join('')
    : '<button disabled style="color:var(--gris)">Aucun résultat pour « '+esc(q)+' »</button>';
  window._palPremier = top.length ? top[0].act : null;
}
function clavierPalette(e){
  if(e.key==='Escape') fermerPalette();
  if(e.key==='Enter' && window._palPremier){ eval(window._palPremier); }
}
document.addEventListener('keydown', e=>{
  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); if(!verrou && S) ouvrirPalette(); }
  if(e.key==='Escape') fermerPalette();
});

async function authGo(){
  const errEl=document.getElementById('au_err'); const err={set textContent(t){ if(errEl) errEl.textContent=t; }};
  const email=document.getElementById('au_mail').value.trim(), mdp=document.getElementById('au_mdp').value;
  const rester=document.getElementById('au_rester').checked;
  if(!email||mdp.length<6){ err.textContent='Email et mot de passe (6 caractères min.) requis.'; return false; }
  err.textContent='Connexion…';
  try{
    const r = await fetch(CFG.url.replace(/\/$/,'') + '/auth/v1/token?grant_type=password',
      {method:'POST', headers:{'apikey':CFG.key,'Content-Type':'application/json'}, body:JSON.stringify({email,password:mdp})});
    const j = await r.json();
    if(!r.ok){ err.textContent = j.msg || j.error_description || j.message || 'Identifiants refusés.'; return false; }
    SES = {access_token:j.access_token, refresh_token:j.refresh_token, user_id:j.user.id, email:j.user.email};
    if(rester) lsSet('aloa_ses', SES); else lsSet('aloa_ses', null);
    try{
      const d = await cloudCharger();
      if(d){ S = d; if(!S.objectifs) S.objectifs=structuredClone(DEFAUT.objectifs); if(!S.accueil) S.accueil=structuredClone(DEFAUT.accueil); }
      else { await cloudSauver(); }
      setSync('ok');
    }catch(e){ setSync('offline'); }
    if(S && S.pinHash) lsSet('aloa_pin', S.pinHash);
    if(S && S.theme) appliquerTheme(S.theme);
    derniereActivite = Date.now();
    fermerAuth(); toast('Connecté ☁️'); render();
  }catch(e){
    err.textContent='Serveur injoignable — vérifiez votre connexion internet.';
    const off=document.getElementById('au_offline');
    if(off) off.innerHTML = '<a href="#" style="color:var(--gris);font-size:.8rem" onclick="fermerAuth();toast(\'Mode hors ligne — vos saisies restent sur ce poste\');return false">Continuer hors ligne sur cet appareil</a>';
  }
  return false;
}
/* ---------- Administration : création de comptes depuis les Paramètres ---------- */
function adminCreerCompte(){
  formModal('👑 Créer un compte (administrateur)', `
    <p style="font-size:.85rem;color:var(--gris);margin-bottom:12px">Le nouveau compte pourra se connecter à l'application, mais ne verra <b>que ses propres données</b> — jamais les vôtres (isolation garantie par la base).</p>
    <div class="f full"><label>Email du nouveau compte</label><input id="adm_mail" type="email"></div>
    <div class="f full" style="margin-top:10px"><label>Mot de passe provisoire (6 caractères min.)</label><input id="adm_mdp" type="text"></div>
    <p id="adm_err" style="color:var(--brique);font-size:.85rem;min-height:1.2em;margin-top:8px"></p>`,
    async ()=>{
      const email=document.getElementById('adm_mail').value.trim(), mdp=document.getElementById('adm_mdp').value;
      const errEl=document.getElementById('adm_err');
      if(!email||mdp.length<6){ if(errEl)errEl.textContent='Email et mot de passe (6 caractères min.) requis.'; return false; }
      try{
        const r = await fetch(CFG.url.replace(/\/$/,'') + '/auth/v1/signup',
          {method:'POST', headers:{'apikey':CFG.key,'Content-Type':'application/json'}, body:JSON.stringify({email,password:mdp})});
        const j = await r.json();
        if(!r.ok){ if(errEl)errEl.textContent = j.msg || j.error_description || j.message || 'Création refusée (vérifiez que les inscriptions sont autorisées dans Supabase).'; return false; }
        toast('Compte « '+email+' » créé — communiquez-lui le mot de passe');
      }catch(e){ if(errEl)errEl.textContent='Serveur injoignable.'; return false; }
    }, 'Créer le compte');
}
charger();
</script>
