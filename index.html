<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALOA Pilot — Suivi commercial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Albert+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --encre:#16265C; --encre-2:#0E1A42; --flamme:#F4553B; --flamme-2:#D8402A;
  --papier:#F6F5F1; --carte:#FFFFFF; --carbone:#1C1E26; --gris:#6B7080; --trait:#E3E1DA;
  --sapin:#1E7A46; --sapin-p:#E4F3E9; --brique:#B3261E; --brique-p:#FBEAE8;
  --ambre:#B45D0C; --ambre-p:#FDF0DF; --bleu-p:#EAEEF9;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Albert Sans',sans-serif;background:var(--papier);color:var(--carbone);min-height:100vh}
.mono{font-family:'Spline Sans Mono',monospace}
h1,h2,.disp{font-family:'Archivo Black',sans-serif;letter-spacing:.01em}

/* ---------- Coque : rail intercalaires + contenu ---------- */
.app{display:flex;min-height:100vh}
.rail{width:196px;background:var(--encre);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0}
.brand{padding:22px 18px 16px}
.brand .disp{font-size:1.15rem;line-height:1.1}
.brand small{display:block;color:#9FB0E4;font-weight:500;margin-top:4px;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase}
.tabs{display:flex;flex-direction:column;gap:2px;margin-top:8px;flex:1}
.tab{display:flex;align-items:center;gap:10px;padding:12px 16px;color:#C7D0EC;background:none;border:none;font:600 .92rem 'Albert Sans';cursor:pointer;text-align:left;border-left:5px solid transparent;transition:background .15s}
.tab:hover{background:rgba(255,255,255,.07)}
.tab.on{background:var(--papier);color:var(--encre);border-left-color:var(--flamme);border-radius:0 var(--r) var(--r) 0;margin-right:-1px}
.tab .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tab .badge{margin-left:auto;background:var(--flamme);color:#fff;border-radius:99px;font-size:.7rem;padding:1px 7px;font-weight:700}
.rail-foot{padding:14px 16px;font-size:.7rem;color:#8CA0D8}
.main{flex:1;min-width:0;padding:26px 30px 60px}

/* ---------- Barre haute ---------- */
.topbar{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.topbar h1{font-size:1.5rem;color:var(--encre)}
.topbar .date{color:var(--gris);font-weight:500}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{border:none;border-radius:10px;padding:10px 16px;font:700 .88rem 'Albert Sans';cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:transform .12s, box-shadow .12s}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--flamme);color:#fff;box-shadow:0 3px 0 var(--flamme-2)}
.btn-p:hover{box-shadow:0 4px 0 var(--flamme-2);transform:translateY(-1px)}
.btn-o{background:var(--carte);color:var(--encre);border:1.5px solid var(--trait)}
.btn-o:hover{border-color:var(--encre)}
.btn-ghost{background:none;color:var(--gris);padding:8px 10px}
.btn-ghost:hover{color:var(--encre)}

/* ---------- KPI ---------- */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px;margin-bottom:22px}
.kpi{background:var(--carte);border:1px solid var(--trait);border-radius:var(--r);padding:14px 16px}
.kpi label{font-size:.72rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--gris)}
.kpi .v{font-family:'Spline Sans Mono';font-weight:700;font-size:1.7rem;color:var(--encre);margin-top:4px;line-height:1.1}
.kpi .v.orange{color:var(--flamme)} .kpi .v.vert{color:var(--sapin)} .kpi .v.rouge{color:var(--brique)}
.kpi small{color:var(--gris);font-size:.75rem}

/* ---------- Filtres 1-clic ---------- */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.chip{border:1.5px solid var(--trait);background:var(--carte);color:var(--carbone);border-radius:99px;padding:8px 15px;font:600 .85rem 'Albert Sans';cursor:pointer;display:inline-flex;gap:7px;align-items:center}
.chip .n{font-family:'Spline Sans Mono';font-weight:700;font-size:.78rem;color:var(--gris)}
.chip.on{border-color:var(--encre);background:var(--encre);color:#fff}
.chip.on .n{color:#FFD3C9}
.chip.c-enc.on{background:var(--flamme);border-color:var(--flamme)}
.chip.c-sig.on{background:var(--sapin);border-color:var(--sapin)}
.chip.c-per.on{background:var(--brique);border-color:var(--brique)}
.search{margin-left:auto;border:1.5px solid var(--trait);border-radius:10px;padding:9px 13px;font:500 .9rem 'Albert Sans';min-width:200px;background:var(--carte)}
.search:focus{outline:2px solid var(--encre);outline-offset:1px}

/* ---------- Lignes-dossiers ---------- */
.rows{display:flex;flex-direction:column;gap:9px}
.row{background:var(--carte);border:1px solid var(--trait);border-left:6px solid var(--gris);border-radius:var(--r);padding:13px 16px;display:grid;grid-template-columns:minmax(160px,1.4fr) minmax(130px,1.1fr) 110px 120px auto;gap:6px 16px;align-items:center}
.row.enc{border-left-color:var(--flamme)} .row.sig{border-left-color:var(--sapin);background:linear-gradient(0deg,var(--sapin-p),var(--sapin-p)) , var(--carte)}
.row.per{border-left-color:var(--brique);background:var(--brique-p)}
.row .who b{font-size:1rem}
.row .who span{display:block;color:var(--gris);font-size:.8rem}
.row .prod{font-size:.88rem}
.row .prod small{display:block;color:var(--gris)}
.row .amt{font-family:'Spline Sans Mono';font-weight:700;font-size:.95rem}
.row .amt small{display:block;color:var(--gris);font-weight:500;font-size:.72rem;font-family:'Albert Sans'}
.st{display:inline-block;border-radius:7px;padding:4px 10px;font-size:.76rem;font-weight:700}
.st-enc{background:var(--bleu-p);color:var(--encre)} .st-env{background:var(--ambre-p);color:var(--ambre)}
.st-sig{background:var(--sapin-p);color:var(--sapin)} .st-per{background:var(--brique-p);color:var(--brique)}
.rowbtns{display:flex;gap:5px;justify-self:end;flex-wrap:wrap}
.ic{border:1.5px solid var(--trait);background:var(--carte);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:.95rem;display:grid;place-items:center}
.ic:hover{border-color:var(--encre)}
.ic.v:hover{border-color:var(--sapin);background:var(--sapin-p)}
.ic.x:hover{border-color:var(--brique);background:var(--brique-p)}
.alerte{grid-column:1/-1;font-size:.8rem;font-weight:600;padding-top:2px}
.alerte.feu{color:var(--brique)} .alerte.ok{color:var(--sapin)} .alerte.plan{color:var(--ambre)}
.raison-tag{font-size:.78rem;color:var(--brique);font-weight:600}
.vide{background:var(--carte);border:1.5px dashed var(--trait);border-radius:var(--r);padding:40px;text-align:center;color:var(--gris)}
.vide b{color:var(--carbone)}

/* ---------- Tickets À faire ---------- */
.tickets{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.ticket{background:var(--carte);border:1px solid var(--trait);border-top:6px solid var(--flamme);border-radius:var(--r);padding:16px;position:relative}
.ticket.retard{border-top-color:var(--brique)}
.ticket .quand{font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.ticket.retard .quand{color:var(--brique)} .ticket:not(.retard) .quand{color:var(--flamme)}
.ticket h3{font-size:1.05rem;margin:5px 0 2px}
.ticket .tel{font-family:'Spline Sans Mono';font-size:.85rem;color:var(--encre)}
.ticket p{color:var(--gris);font-size:.85rem;margin:6px 0 12px}
.ticket .tbtns{display:flex;gap:7px;flex-wrap:wrap}

/* ---------- Tableaux (mensuel, pilotage, objectifs) ---------- */
.card{background:var(--carte);border:1px solid var(--trait);border-radius:var(--r);padding:18px;margin-bottom:18px}
.card h2{font-size:.95rem;color:var(--encre);margin-bottom:12px;letter-spacing:.03em}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{background:var(--encre);color:#fff;font-weight:700;padding:9px 10px;text-align:left;font-size:.78rem;letter-spacing:.04em}
th:first-child{border-radius:8px 0 0 8px} th:last-child{border-radius:0 8px 8px 0}
td{padding:9px 10px;border-bottom:1px solid var(--trait)}
tr:nth-child(even) td{background:#FAFAF7}
td.num{font-family:'Spline Sans Mono';font-weight:700;text-align:right}
tr.total td{background:var(--flamme);color:#fff;font-weight:700;border:none}
tr.total td.num{color:#fff}
.bar{height:9px;background:var(--trait);border-radius:99px;overflow:hidden;min-width:80px}
.bar i{display:block;height:100%;border-radius:99px;background:var(--sapin)}
.bar.low i{background:var(--brique)} .bar.mid i{background:var(--ambre)}
input.cell{width:80px;border:1.5px solid var(--trait);border-radius:8px;padding:6px 8px;font:600 .85rem 'Spline Sans Mono';text-align:right;background:#fff}
input.cell:focus{outline:2px solid var(--encre)}
select.annee{border:1.5px solid var(--trait);border-radius:10px;padding:8px 12px;font:700 .9rem 'Albert Sans';background:var(--carte)}
canvas{max-height:260px}

/* ---------- Autocomplétion client ---------- */
.sugwrap{position:relative}
.sug{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--carte);border:1.5px solid var(--encre);border-radius:10px;box-shadow:0 8px 24px rgba(14,26,66,.18);z-index:60;max-height:230px;overflow:auto}
.sug button{display:block;width:100%;text-align:left;background:none;border:none;padding:10px 13px;cursor:pointer;font:500 .9rem 'Albert Sans';border-bottom:1px solid var(--trait)}
.sug button:last-child{border-bottom:none}
.sug button:hover,.sug button.hl{background:var(--bleu-p)}
.sug b{color:var(--encre)}
.sug small{display:block;color:var(--gris)}
.sug .new{color:var(--flamme);font-weight:700}
/* ---------- Modale ---------- */
.veil{position:fixed;inset:0;background:rgba(14,26,66,.55);display:none;align-items:flex-start;justify-content:center;padding:30px 14px;overflow:auto;z-index:50}
.veil.on{display:flex}
.modal{background:var(--carte);border-radius:16px;max-width:640px;width:100%;padding:24px}
.modal h2{color:var(--encre);font-size:1.1rem;margin-bottom:16px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f{display:flex;flex-direction:column;gap:5px}
.f.full{grid-column:1/-1}
.f label{font-size:.75rem;font-weight:700;color:var(--gris);letter-spacing:.04em;text-transform:uppercase}
.f input,.f select,.f textarea{border:1.5px solid var(--trait);border-radius:10px;padding:10px 12px;font:500 .92rem 'Albert Sans';background:#fff}
.f input:focus,.f select:focus,.f textarea:focus{outline:2px solid var(--encre)}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}

/* ---------- Paramètres ---------- */
.plist{display:flex;flex-direction:column;gap:6px}
.pitem{display:flex;gap:8px;align-items:center;background:#FAFAF7;border:1px solid var(--trait);border-radius:9px;padding:7px 10px}
.pitem span{flex:1;font-weight:500}
.pitem input{width:70px;border:1.5px solid var(--trait);border-radius:7px;padding:5px;font:600 .85rem 'Spline Sans Mono';text-align:right}
.padd{display:flex;gap:8px;margin-top:10px}
.padd input{flex:1;border:1.5px solid var(--trait);border-radius:9px;padding:9px 12px;font:500 .9rem 'Albert Sans'}
.note{background:var(--bleu-p);border-radius:10px;padding:12px 14px;font-size:.83rem;color:var(--encre);margin-bottom:14px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--carbone);color:#fff;border-radius:10px;padding:12px 20px;font-weight:600;transition:transform .25s;z-index:99}
.toast.on{transform:translateX(-50%) translateY(0)}

@media (max-width:860px){
  .app{flex-direction:column}
  .rail{width:100%;height:auto;position:static;flex-direction:column}
  .tabs{flex-direction:row;overflow-x:auto;padding:0 8px 8px}
  .tab{border-left:none;border-bottom:4px solid transparent;white-space:nowrap;border-radius:0}
  .tab.on{border-bottom-color:var(--flamme);border-radius:10px 10px 0 0;margin-right:0}
  .main{padding:18px 14px 50px}
  .row{grid-template-columns:1fr 1fr}
  .rowbtns{justify-self:start}
  .grid2{grid-template-columns:1fr}
  .search{min-width:0;width:100%;margin-left:0}
}
@media print{
  .rail,.actions,.filters,.rowbtns,.tab,.btn{display:none!important}
  body{background:#fff}
  .main{padding:0}
  section{display:block!important}
  .card{break-inside:avoid;border:1px solid #ccc}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <nav class="rail">
    <div class="brand">
      <div class="disp">ALOA&nbsp;PILOT</div>
      <small>Suivi commercial</small>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="rail-foot" id="syncfoot"></div>
  </nav>
  <main class="main" id="main"></main>
</div>
<div class="veil" id="veil"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>
<script>
/* ================= ÉTAT & STOCKAGE ================= */
const AUJ = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const iso = d => d.toISOString().slice(0,10);
const fmtD = s => s ? new Date(s+'T00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
const eur = n => (n||0).toLocaleString('fr-FR') + ' €';
const MOIS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

const DEFAUT = {
  deals: [
    {id:1, dateContact:'2026-07-01', client:'SARL Dupont BTP', contact:'M. Dupont', coord:'dupont@exemple.fr · 03 26 00 00 00', origine:'Portefeuille cabinet', produit:"Digit'Gestion", mensuel:40, unique:0, statut:'Devis envoyé', dateDevis:'2026-07-03', derniereRelance:'2026-07-10', nbRelances:1, prochaineRelance:'', prochaineAction:'Relancer le 20/07', commentaires:'Attend validation associé', raisonPerte:''},
    {id:2, dateContact:'2026-07-05', client:'SCI Les Tilleuls', contact:'Mme Martin', coord:'martin@exemple.fr', origine:'Recommandation', produit:'Logiciel + Matériel', mensuel:5, unique:890, statut:'Signé', dateDevis:'2026-07-06', derniereRelance:'', nbRelances:0, prochaineRelance:'', prochaineAction:'Onboarding client', commentaires:'Sérénité SCI + 1 PC portable, signé le 12/07', raisonPerte:''},
    {id:3, dateContact:'2026-07-08', client:'EURL Garage Petit', contact:'M. Petit', coord:'06 00 00 00 00', origine:'Prospection téléphonique', produit:"Digi'Pilot", mensuel:55, unique:0, statut:'Relance', dateDevis:'2026-07-09', derniereRelance:'2026-07-15', nbRelances:2, prochaineRelance:'2026-07-16', prochaineAction:'Rappeler', commentaires:'Compare avec un concurrent', raisonPerte:''}
  ],
  params: {
    produits:["Sérénité SCI/HOLDING/LMNP","Sérénité BNC","Autonomie SCI/HOLDING/LMNP","Autonomie TPE","DIGIT'Achats","DIGIT'Achats & Ventes","Digit'Gestion","Digi'Pilot","Digi'Pilot +","Matériel informatique","PC / poste de travail","Serveur","Imprimante / scanner","Logiciel + Matériel"],
    origines:["Portefeuille cabinet","Recommandation","Prospection téléphonique","Salon / événement","Site web","Réseaux sociaux"],
    raisons:["Prix trop élevé","Concurrent choisi","Pas de besoin / projet abandonné","Sans réponse","Timing reporté","Autre"],
    probas:{"Prospection":10,"Devis envoyé":40,"Relance":50,"En attente":30}
  },
  objectifs: Object.fromEntries(Array.from({length:12},(_,m)=>[m,{contacts:8,signes:2,ca:1500}])),
  annee: 2026,
  nextId: 4,
  clients: [
    {id:1, nom:'SARL Dupont BTP', contact:'M. Dupont', email:'dupont@exemple.fr', tel:'03 26 00 00 00', notes:''},
    {id:2, nom:'SCI Les Tilleuls', contact:'Mme Martin', email:'martin@exemple.fr', tel:'', notes:''},
    {id:3, nom:'EURL Garage Petit', contact:'M. Petit', email:'', tel:'06 00 00 00 00', notes:''}
  ],
  nextClientId: 4,
  accueil: {raccourcis:true, relances:true, pipeline:true, signes:true, objectif:true, ca:true, derniers:true},
  pinHash: ''
};
const STATUTS_ENCOURS = ['Prospection','Devis envoyé','Relance','En attente'];
const TOUS_STATUTS = [...STATUTS_ENCOURS,'Signé','Perdu'];
let S = null, vue = 'accueil', filtre = 'encours', sousFiltre = '', recherche = '';

const artefact = typeof window.storage !== 'undefined' && window.storage && window.storage.get;

/* ---------- CLOUD (Supabase) ---------- */
function lsGet(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
let CFG = lsGet('aloa_cfg') || null;         // {url, key}
let SES = lsGet('aloa_ses') || null;         // {access_token, refresh_token, user_id, email}
let syncEtat = 'local';                      // local | ok | pending | offline
function setSync(s){ syncEtat = s; const f=document.getElementById('syncfoot'); if(f) f.innerHTML = piedSync(); }
function piedSync(){
  if(!CFG || !SES) return 'Mode local — données sur ce poste.<br><a href="#" style="color:#FFB4A3" onclick="vue=\'params\';render();return false">Connecter le cloud →</a>';
  const ic = {ok:'☁️ Synchronisé', pending:'⏳ Enregistrement…', offline:'⚠️ Hors ligne — sauvegardé sur ce poste'}[syncEtat]||'☁️';
  return `${ic}<br>${esc(SES.email)} · <a href="#" style="color:#FFB4A3" onclick="deconnecter();return false">Déconnexion</a>`;
}
async function sb(path, opts={}, retry=true){
  const h = {'apikey':CFG.key, 'Content-Type':'application/json', ...(opts.headers||{})};
  if(SES) h['Authorization'] = 'Bearer ' + SES.access_token;
  const r = await fetch(CFG.url.replace(/\/$/,'') + path, {...opts, headers:h});
  if(r.status===401 && retry && SES && SES.refresh_token){
    const ok = await rafraichir();
    if(ok) return sb(path, opts, false);
  }
  return r;
}
async function rafraichir(){
  try{
    const r = await fetch(CFG.url.replace(/\/$/,'') + '/auth/v1/token?grant_type=refresh_token',
      {method:'POST', headers:{'apikey':CFG.key,'Content-Type':'application/json'}, body:JSON.stringify({refresh_token:SES.refresh_token})});
    if(!r.ok) return false;
    const j = await r.json();
    SES = {access_token:j.access_token, refresh_token:j.refresh_token, user_id:j.user.id, email:j.user.email};
    lsSet('aloa_ses', SES); return true;
  }catch(e){ return false; }
}
async function cloudCharger(){
  const r = await sb('/rest/v1/etat?select=data', {method:'GET'});
  if(!r.ok) throw new Error('lecture');
  const rows = await r.json();
  return rows.length ? rows[0].data : null;
}
async function cloudSauver(){
  const r = await sb('/rest/v1/etat', {method:'POST',
    headers:{'Prefer':'resolution=merge-duplicates'},
    body: JSON.stringify({user_id: SES.user_id, data: S, updated_at: new Date().toISOString()})});
  if(!r.ok) throw new Error('écriture');
}
function deconnecter(){ SES=null; lsSet('aloa_ses', null); toast('Déconnecté — mode local'); setSync('local'); render(); }

async function charger(){
  S = null;
  if(CFG && SES){
    try{ const d = await cloudCharger(); if(d) S = d; setSync('ok'); }
    catch(e){ setSync('offline'); }
  }
  if(!S){
    if(artefact){ try{ const r = await window.storage.get('aloa_crm_v1'); if(r) S = JSON.parse(r.value); }catch(e){} }
    else { S = lsGet('aloa_crm_v1'); }
  }
  if(!S) S = structuredClone(DEFAUT);
  if(!S.objectifs) S.objectifs = structuredClone(DEFAUT.objectifs);
  if(!S.accueil) S.accueil = structuredClone(DEFAUT.accueil);
  if(!S.clients){
    S.clients = []; S.nextClientId = 1;
    [...new Set(S.deals.map(d=>d.client).filter(Boolean))].forEach(nom=>{
      const d = S.deals.find(x=>x.client===nom);
      S.clients.push({id:S.nextClientId++, nom, contact:d.contact||'', email:(d.coord||'').split('·')[0].trim(), tel:'', notes:''});
    });
  }
  if(S.pinHash) lsSet('aloa_pin', S.pinHash);
  render();
  demarrerVerrou();
}
let saveT = null;
function sauver(msg){
  clearTimeout(saveT);
  saveT = setTimeout(async ()=>{
    const data = JSON.stringify(S);
    try{
      if(artefact) await window.storage.set('aloa_crm_v1', data);
      else localStorage.setItem('aloa_crm_v1', data);
    }catch(e){}
    if(CFG && SES){
      setSync('pending');
      try{ await cloudSauver(); setSync('ok'); if(msg) toast(msg + ' ☁️'); }
      catch(e){ setSync('offline'); toast('Hors ligne — sauvegardé sur ce poste, synchronisation à la reconnexion'); }
    } else if(msg) toast(msg);
  }, 300);
}
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),2200); }

/* ================= CALCULS ================= */
const enCours = d => STATUTS_ENCOURS.includes(d.statut);
const joursDepuis = s => s ? Math.floor((AUJ() - new Date(s+'T00:00'))/86400000) : null;
function derniereAction(d){ return [d.dateContact,d.dateDevis,d.derniereRelance].filter(Boolean).sort().pop(); }
function alerte(d){
  if(!enCours(d)) return null;
  if(d.prochaineRelance){
    const j = joursDepuis(d.prochaineRelance);
    if(j>0) return {t:'feu', txt:`🔥 Relance en retard de ${j} j (prévue le ${fmtD(d.prochaineRelance)})`};
    if(j===0) return {t:'feu', txt:'🔥 À relancer aujourd\u2019hui'};
    return {t:'ok', txt:`⏳ Relance prévue le ${fmtD(d.prochaineRelance)}`};
  }
  const j = joursDepuis(derniereAction(d));
  if(j>7) return {t:'plan', txt:`📝 ${j} j sans action — planifiez une relance`};
  return {t:'ok', txt:'🟢 Suivi à jour'};
}
const aFaire = () => S.deals.filter(d => enCours(d) && d.prochaineRelance && joursDepuis(d.prochaineRelance)>=0);
const kSum = (arr,f) => arr.reduce((a,d)=>a+(+f(d)||0),0);
function statsGlobales(){
  const enc = S.deals.filter(enCours), sig = S.deals.filter(d=>d.statut==='Signé'), per = S.deals.filter(d=>d.statut==='Perdu');
  return {
    enc, sig, per,
    pipelineM: kSum(enc,d=>d.mensuel), pipelineU: kSum(enc,d=>d.unique),
    mrr: kSum(sig,d=>d.mensuel), caU: kSum(sig,d=>d.unique),
    ca1an: kSum(sig,d=>d.mensuel)*12 + kSum(sig,d=>d.unique),
    conv: (sig.length+per.length) ? sig.length/(sig.length+per.length) : 0,
    forecast: STATUTS_ENCOURS.reduce((a,st)=>a + kSum(S.deals.filter(d=>d.statut===st),d=>d.mensuel)*(S.params.probas[st]||0)/100, 0)
  };
}
function statsMois(annee){
  return Array.from({length:12},(_,m)=>{
    const dansMois = s => s && new Date(s+'T00:00').getFullYear()===annee && new Date(s+'T00:00').getMonth()===m;
    const contacts = S.deals.filter(d=>dansMois(d.dateContact)).length;
    const devis = S.deals.filter(d=>dansMois(d.dateDevis)).length;
    const sig = S.deals.filter(d=>d.statut==='Signé' && dansMois(d.dateDevis));
    const mrr = kSum(sig,d=>d.mensuel), un = kSum(sig,d=>d.unique);
    return {contacts, devis, signes:sig.length, mrr, unique:un, ca:mrr*12+un};
  });
}

  if(q) list = list.filter(c => (c.nom+' '+(c.contact||'')+' '+(c.email||'')).toLowerCase().includes(q));
  list = list.slice(0,6);

  if(!list.length && !q){ box.style.display='none'; return; }
  box.innerHTML = list.map(c=>`<button type="button" onclick="choisirClient(${c.id})"><b>${surligner(c.nom,q)}</b><small>${esc([c.contact,c.email,c.tel].filter(Boolean).join(' · ')||'—')}</small></button>`).join('')

  box.style.display = box.innerHTML ? 'block' : 'none';

function surligner(txt,q){
  if(!q) return esc(txt);
  const i = txt.toLowerCase().indexOf(q);
  if(i<0) return esc(txt);
  return esc(txt.slice(0,i)) + '<mark style="background:var(--ambre-p);border-radius:3px">' + esc(txt.slice(i,i+q.length)) + '</mark>' + esc(txt.slice(i+q.length));
}
function choisirClient(id){
  const c = S.clients.find(x=>x.id===id);
  const set=(i,v)=>{const e=document.getElementById(i); if(e) e.value=v;};
  set('f_client', c.nom);
  const cont=document.getElementById('f_contact'), coord=document.getElementById('f_coord');
  if(cont && !cont.value) cont.value = c.contact||'';
  if(coord && !coord.value) coord.value = [c.email,c.tel].filter(Boolean).join(' · ');
  fermerSug();
}
function fermerSug(){ const b=document.getElementById('sug_clients'); if(b) b.style.display='none'; }
function navSuggestions(e){
  const box = document.getElementById('sug_clients');
  if(!box || box.style.display==='none') return;
  const items = [...box.querySelectorAll('button')];
  if(e.key==='ArrowDown'||e.key==='ArrowUp'){
    e.preventDefault();
    sugIdx = e.key==='ArrowDown' ? Math.min(sugIdx+1, items.length-1) : Math.max(sugIdx-1, 0);
    items.forEach((b,i)=>b.classList.toggle('hl', i===sugIdx));
    items[sugIdx].scrollIntoView({block:'nearest'});
  } else if(e.key==='Enter' && sugIdx>=0){ e.preventDefault(); items[sugIdx].click(); }
  else if(e.key==='Escape'){ fermerSug(); }
}

      <div class="rowbtns">
        <button class="ic" title="Créer un devis pour ce client" onclick="devisPourClient(${c.id})">📋</button>
        <button class="ic" title="Modifier" onclick="formClient(${c.id})">✏️</button>
        <button class="ic x" title="Supprimer" onclick="supprimerClient(${c.id})">🗑️</button>
      </div>
      ${c.notes?`<div class="alerte" style="color:var(--gris)">📝 ${esc(c.notes)}</div>`:''}
    </div>`;}).join('')}</div>`
  :`<div class="vide"><b>Aucun client.</b><br>Ajoutez-en un, importez votre fichier Excel, ou créez un devis : le client s'ajoute tout seul ici.</div>`}`;
}
function formClient(id){
  const c = id ? S.clients.find(x=>x.id===id) : {};
  formModal(id?`Modifier — ${esc(c.nom)}`:'Nouveau client', `
    <div class="fgrid">
      <div class="f full"><label>Nom / entreprise *</label><input id="c_nom" value="${esc(c.nom||'')}"></div>
      <div class="f"><label>Contact</label><input id="c_contact" value="${esc(c.contact||'')}"></div>
      <div class="f"><label>Téléphone</label><input id="c_tel" value="${esc(c.tel||'')}"></div>
      <div class="f full"><label>Email</label><input id="c_email" type="email" value="${esc(c.email||'')}"></div>
      <div class="f full"><label>Notes</label><textarea id="c_notes" rows="2">${esc(c.notes||'')}</textarea></div>
    </div>`,
    ()=>{
      const v=x=>document.getElementById('c_'+x).value.trim();
      if(!v('nom')){ toast('Le nom est requis'); return false; }
      const obj={nom:v('nom'),contact:v('contact'),tel:v('tel'),email:v('email'),notes:v('notes')};
      if(id){ const ancien=c.nom; Object.assign(c,obj); S.deals.forEach(d=>{ if(d.clientId===c.id||d.client===ancien){ d.client=c.nom; d.clientId=c.id; } }); }
      else S.clients.push({id:S.nextClientId++, ...obj});
      sauver(id?'Client mis à jour':'Client créé');
    });
}
function supprimerClient(id){
  const c=S.clients.find(x=>x.id===id);
  const nb=S.deals.filter(d=>d.clientId===id||d.client===c.nom).length;
  formModal(`Supprimer — ${esc(c.nom)}`, `<p>${nb?`Ce client a ${nb} devis dans le suivi : ils seront conservés, seule la fiche client disparaît.`:'La fiche client sera supprimée.'}</p>`,
    ()=>{ S.clients=S.clients.filter(x=>x.id!==id); sauver('Client supprimé'); }, 'Supprimer');
}
function devisPourClient(id){
  const c=S.clients.find(x=>x.id===id);
  ouvrirForm();
  setTimeout(()=>{
    const set=(i,v)=>{const e=document.getElementById(i); if(e)e.value=v;};
    set('f_client',c.nom); set('f_contact',c.contact||''); set('f_coord',[c.email,c.tel].filter(Boolean).join(' · '));
  },30);
}
function importerClients(inp){
  const f=inp.files[0]; if(!f) return;
  const lire = rows => { inp.value=''; mapperColonnes(rows.filter(r=>r && r.some(x=>String(x||'').trim()))); };
  if(/\.csv$/i.test(f.name)){
    const r=new FileReader();
    r.onload=()=>lire(r.result.split(/\r?\n/).map(l=>l.split(/[;,\t]/)));
    r.readAsText(f);
  } else {
    const r=new FileReader();
    r.onload=()=>{ try{
      const wbk=XLSX.read(new Uint8Array(r.result),{type:'array'});
      lire(XLSX.utils.sheet_to_json(wbk.Sheets[wbk.SheetNames[0]],{header:1}));
    }catch(e){ toast('Fichier illisible — utilisez un .xlsx ou un .csv'); } };
    r.readAsArrayBuffer(f);
  }
}
function mapperColonnes(rows){
  if(!rows.length){ toast('Fichier vide'); return; }
  const nbCol = Math.max(...rows.slice(0,10).map(r=>r.length));
  const h = (rows[0]||[]).map(x=>String(x||'').trim());
  const lettres = i => String.fromCharCode(65+i);
  // détection automatique proposée par défaut
  const auto = re => h.findIndex(x=>re.test(x.toLowerCase()));
  const dNom = auto(/nom|entreprise|soci|client|raison/), dMail = auto(/mail|courriel/),
        dCont = auto(/contact|interlocuteur|prenom|prénom/), dTel = auto(/t[eé]l|phone|portable/);
  const enTetes = dNom>-1 || dMail>-1;
  const optCols = (sel) => `<option value="-1">— ignorer —</option>` +
    Array.from({length:nbCol},(_,i)=>`<option value="${i}" ${i===sel?'selected':''}>Colonne ${lettres(i)}${h[i]?` — « ${esc(h[i].slice(0,25))} »`:''}</option>`).join('');
  const apercu = rows.slice(enTetes?1:0, (enTetes?1:0)+3);
  formModal('Importer des clients — associez les colonnes', `
    <p style="font-size:.85rem;color:var(--gris);margin-bottom:12px">Fichier lu : <b>${rows.length - (enTetes?1:0)} ligne(s)</b>. Indiquez quelle colonne correspond à quoi (seul le nom est obligatoire).</p>
    <div class="fgrid">
      <div class="f"><label>Nom / entreprise *</label><select id="map_nom">${optCols(dNom>-1?dNom:0)}</select></div>
      <div class="f"><label>Email</label><select id="map_mail">${optCols(dMail)}</select></div>
      <div class="f"><label>Contact</label><select id="map_cont">${optCols(dCont)}</select></div>
      <div class="f"><label>Téléphone</label><select id="map_tel">${optCols(dTel)}</select></div>
      <div class="f full" style="flex-direction:row;align-items:center;gap:8px">
        <input type="checkbox" id="map_ent" ${enTetes?'checked':''} style="width:auto"> <label for="map_ent" style="text-transform:none;font-weight:500;font-size:.85rem">La 1ère ligne du fichier contient les titres de colonnes (ne pas l'importer)</label></div>
    </div>
    <div style="margin-top:12px;overflow-x:auto"><table style="font-size:.8rem">
      <tr>${Array.from({length:Math.min(nbCol,6)},(_,i)=>`<th>Col. ${lettres(i)}</th>`).join('')}</tr>
      ${apercu.map(r=>`<tr>${Array.from({length:Math.min(nbCol,6)},(_,i)=>`<td>${esc(String(r[i]||'').slice(0,22))}</td>`).join('')}</tr>`).join('')}
    </table><p style="font-size:.75rem;color:var(--gris);margin-top:4px">Aperçu des premières lignes${nbCol>6?' (6 premières colonnes affichées)':''}.</p></div>`,
    ()=>{
      const g = id => +document.getElementById(id).value;
      const iNom=g('map_nom'), iMail=g('map_mail'), iCont=g('map_cont'), iTel=g('map_tel');
      if(iNom<0){ toast('Choisissez la colonne du nom'); return false; }
      const start = document.getElementById('map_ent').checked ? 1 : 0;
      let ajout=0, doublons=0, vides=0;
      for(let i=start;i<rows.length;i++){
        const val = j => j>-1 ? String(rows[i][j]||'').trim() : '';
        const nom = val(iNom);
        if(!nom){ vides++; continue; }
        if(S.clients.some(c=>c.nom.toLowerCase()===nom.toLowerCase())){ doublons++; continue; }
        S.clients.push({id:S.nextClientId++, nom, contact:val(iCont), email:val(iMail), tel:val(iTel), notes:''});
        ajout++;
      }
      sauver(`Import terminé : ${ajout} client(s) ajouté(s)${doublons?`, ${doublons} doublon(s) ignoré(s)`:''}${vides?`, ${vides} ligne(s) sans nom`:''}`);
    }, 'Importer');
}

/* ================= CODE PIN & VERROUILLAGE ================= */
let verrou=false, derniereActivite=Date.now();
async function hashPin(p){
  const b=await crypto.subtle.digest('SHA-256', new TextEncoder().encode('aloa:'+p));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function pinActif(){ return !!(lsGet('aloa_pin') || (S&&S.pinHash)); }
function ecranVerrou(){
  verrou=true;
  let el=document.getElementById('lock');
  if(!el){ el=document.createElement('div'); el.id='lock'; document.body.appendChild(el); }
  el.style.cssText='position:fixed;inset:0;background:var(--encre);z-index:200;display:flex;align-items:center;justify-content:center';
  el.innerHTML=`<div style="text-align:center;color:#fff;max-width:300px;padding:20px">
    <div class="disp" style="font-size:1.4rem;margin-bottom:6px">ALOA PILOT</div>
    <p style="color:#9FB0E4;margin-bottom:18px">Saisissez votre code PIN</p>
    <input id="pin_in" type="password" inputmode="numeric" maxlength="8" autocomplete="off"
      style="width:170px;text-align:center;font:700 1.6rem 'Spline Sans Mono';letter-spacing:.35em;border:none;border-radius:12px;padding:12px"
      oninput="essaiPin(this)">
    <p id="pin_err" style="color:#FFB4A3;margin-top:12px;font-size:.85rem;min-height:1.2em"></p></div>`;
  setTimeout(()=>{const i=document.getElementById('pin_in'); if(i)i.focus();},50);
}
async function essaiPin(inp){
  if(inp.value.length<4) return;
  const h=await hashPin(inp.value);
  const ref=(S&&S.pinHash)||lsGet('aloa_pin');
  if(h===ref){ verrou=false; derniereActivite=Date.now(); const el=document.getElementById('lock'); if(el)el.remove(); }
  else{ const e=document.getElementById('pin_err'); if(e)e.textContent='Code incorrect'; inp.value=''; }
}
function definirPin(){
  formModal(pinActif()?'Modifier le code PIN':'Définir un code PIN', `
    <p style="font-size:.85rem;color:var(--gris);margin-bottom:12px">Le code sera demandé à chaque ouverture et après 5 minutes d'inactivité. Il est valable sur tous vos appareils connectés au même compte.</p>
    <div class="f full"><label>Nouveau code (4 à 8 chiffres)</label><input id="pin_new" type="password" inputmode="numeric" maxlength="8"></div>`,
    async ()=>{
      const p=document.getElementById('pin_new').value;
      if(!/^\d{4,8}$/.test(p)){ toast('4 à 8 chiffres uniquement'); return false; }
      const h=await hashPin(p);
      S.pinHash=h; lsSet('aloa_pin',h); sauver('Code PIN activé');
    });
}
function retirerPin(){
  formModal('Désactiver le code PIN', `<p>L'application s'ouvrira sans code.</p>`,
    ()=>{ S.pinHash=''; lsSet('aloa_pin',null); localStorage.removeItem('aloa_pin'); sauver('Code PIN désactivé'); }, 'Désactiver');
}
function demarrerVerrou(){
  if(pinActif()) ecranVerrou();
  ['click','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,()=>{ if(!verrou) derniereActivite=Date.now(); },true));
  setInterval(()=>{ if(pinActif() && !verrou && Date.now()-derniereActivite > 5*60*1000) ecranVerrou(); }, 10000);
}

function ecranConfig(){
  formModal('Connexion au serveur Supabase', `
    <p style="font-size:.85rem;color:var(--gris);margin-bottom:12px">Copiez ces deux valeurs depuis votre projet Supabase (Settings → API). Le guide d'installation fourni avec l'application explique tout pas à pas.</p>
    <div class="f full"><label>URL du projet</label><input id="cfg_url" placeholder="https://xxxx.supabase.co" value="${CFG?esc(CFG.url):''}"></div>
    <div class="f full" style="margin-top:10px"><label>Clé « anon public »</label><input id="cfg_key" placeholder="eyJhbGci…" value="${CFG?esc(CFG.key):''}"></div>`,
    ()=>{
      const url=document.getElementById('cfg_url').value.trim(), key=document.getElementById('cfg_key').value.trim();
      if(!url.startsWith('http')||!key){ toast('URL et clé requises'); return false; }
      CFG={url,key}; lsSet('aloa_cfg',CFG); toast('Serveur enregistré');
      setTimeout(ecranAuth, 350);
    }, 'Enregistrer');
}
function ecranAuth(){
  formModal('Votre compte', `
    <div class="f full"><label>Email</label><input id="au_mail" type="email" placeholder="vous@exemple.fr"></div>
    <div class="f full" style="margin-top:10px"><label>Mot de passe (6 caractères min.)</label><input id="au_mdp" type="password"></div>
    <p id="au_err" style="color:var(--brique);font-size:.85rem;margin-top:10px"></p>
    <p style="font-size:.82rem;color:var(--gris);margin-top:6px">Première visite ? « Créer mon compte ». Déjà inscrit ? « Se connecter ».</p>
    <div class="actions" style="margin-top:8px"><button class="btn btn-o" onclick="authGo('signup')">Créer mon compte</button></div>`,
    ()=>authGo('login'), 'Se connecter');
}
async function authGo(mode){
  const email=document.getElementById('au_mail').value.trim(), mdp=document.getElementById('au_mdp').value;
  const errEl=document.getElementById('au_err'); const err={set textContent(t){ if(errEl) errEl.textContent=t; }};
  if(!email||mdp.length<6){ err.textContent='Email et mot de passe (6 caractères min.) requis.'; return false; }
  err.textContent='Connexion…';
  try{
    const path = mode==='signup' ? '/auth/v1/signup' : '/auth/v1/token?grant_type=password';
    const r = await fetch(CFG.url.replace(/\/$/,'') + path,
      {method:'POST', headers:{'apikey':CFG.key,'Content-Type':'application/json'}, body:JSON.stringify({email,password:mdp})});
    const j = await r.json();
    if(!r.ok){ err.textContent = j.msg || j.error_description || j.message || 'Identifiants refusés.'; return false; }
    if(mode==='signup' && !j.access_token){ err.textContent='Compte créé — confirmez votre email puis reconnectez-vous (ou désactivez la confirmation d\u2019email dans Supabase, voir guide).'; return false; }
    SES = {access_token:j.access_token, refresh_token:j.refresh_token, user_id:j.user.id, email:j.user.email};
    lsSet('aloa_ses', SES);
    // 1ère connexion : si le cloud est vide, on y pousse les données locales ; sinon on prend le cloud
    try{
      const d = await cloudCharger();
      if(d){ S = d; } else { await cloudSauver(); }
      setSync('ok');
    }catch(e){ setSync('offline'); }
    fermer(); toast('Connecté ☁️'); render();
  }catch(e){ err.textContent='Serveur injoignable — vérifiez l\u2019URL et votre connexion.'; }
  return false;
}
charger();
</script>
